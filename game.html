<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0d0b2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Word Monsters">
<link rel="manifest" href="./manifest.json">
<link rel="icon" href="./icon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<title>Word Monsters - 영어 문장 퀴즈</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:#0d0b2e}
body{font-family:'Nunito',system-ui,sans-serif;color:#f0eeff;overscroll-behavior:none}

:root{
  --bg:#0d0b2e;--card:#1a1750;--border:rgba(255,255,255,0.12);
  --t1:#f0eeff;--t2:#8888bb;
  --g1:#ff6b6b;--g2:#ff9f43;--g3:#feca57;--g4:#26de81;--g5:#45aaf2;--g6:#a55eea;
  --gold:#fbbf24;--ok:#26de81;--err:#ff6b6b;--purple:#7c3aed;
  --nav:68px;--r:18px;
}

#app{height:100vh;display:flex;flex-direction:column;max-width:430px;margin:0 auto;position:relative;overflow:hidden}

.scr{flex:1;overflow-y:auto;overflow-x:hidden;padding:16px 16px calc(var(--nav) + env(safe-area-inset-bottom,0px) + 16px);display:none;-webkit-overflow-scrolling:touch}
.scr.on{display:block}

/* NAV */
#nav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:430px;
  height:calc(var(--nav) + env(safe-area-inset-bottom,0px));
  padding-bottom:env(safe-area-inset-bottom,0px);
  background:rgba(15,13,45,0.96);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border-top:1px solid var(--border);display:flex;z-index:100;
}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;border:none;background:none;color:var(--t2);cursor:pointer;font-family:inherit;font-size:10px;font-weight:800;touch-action:manipulation;-webkit-appearance:none;user-select:none;transition:.15s}
.nb.on{color:var(--purple)}
.nb-i{font-size:22px;line-height:1;transition:.2s transform}
.nb.on .nb-i{transform:scale(1.18)}

/* SHARED */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px}
.stitle{font-size:20px;font-weight:900;margin:20px 0 12px}
.slabel{font-size:11px;font-weight:800;color:var(--t2);letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px}
.badge{display:flex;align-items:center;gap:5px;background:var(--card);border:1px solid var(--border);border-radius:999px;padding:6px 13px;font-size:14px;font-weight:900}

/* HOME */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 0 14px}
.appname{font-size:20px;font-weight:900;background:linear-gradient(135deg,#c084fc,#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

.hero{background:linear-gradient(135deg,#1a1750,#231f6a);border:1px solid var(--border);border-radius:24px;padding:24px;text-align:center;margin-bottom:16px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-40px;right:-40px;width:150px;height:150px;background:radial-gradient(circle,rgba(124,58,237,.3),transparent 70%);border-radius:50%}
.hero-em{font-size:72px;line-height:1;margin-bottom:8px;display:block;animation:fl 3s ease-in-out infinite}
@keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.hero-nm{font-size:13px;font-weight:800;color:var(--t2);margin-bottom:12px}
.bar-wrap{background:rgba(255,255,255,.1);border-radius:999px;height:8px;overflow:hidden;margin-bottom:4px}
.bar-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,#a78bfa,#60a5fa);transition:width .6s}
.bar-hint{font-size:11px;color:var(--t2);font-weight:700}

.grade-row{display:flex;gap:10px;overflow-x:auto;padding-bottom:6px;scroll-snap-type:x mandatory}
.grade-row::-webkit-scrollbar{display:none}
.gc{flex-shrink:0;scroll-snap-align:start;width:80px;border-radius:16px;padding:12px 8px;text-align:center;border:2.5px solid rgba(255,255,255,.08);background:var(--card);cursor:pointer;transition:.15s;-webkit-appearance:none;touch-action:manipulation;font-family:inherit;user-select:none;display:flex;flex-direction:column;align-items:center;gap:3px}
.gc:active{transform:scale(.92)}
.gc.sel{border-color:currentColor;background:rgba(255,255,255,.06)}
.gc .gn{font-size:26px;font-weight:900;line-height:1}
.gc .gl{font-size:10px;font-weight:800;opacity:.65}
.gc .gm{font-size:18px;line-height:1}

.btn-play{display:block;width:100%;border:none;border-radius:16px;padding:18px;font-size:20px;font-weight:900;cursor:pointer;font-family:inherit;background:linear-gradient(135deg,#7c3aed,#4f46e5);color:white;box-shadow:0 8px 24px rgba(124,58,237,.4);margin-top:16px;touch-action:manipulation;-webkit-appearance:none;user-select:none;transition:.15s}
.btn-play:active{transform:scale(.97);box-shadow:0 4px 12px rgba(124,58,237,.3)}

.lvrow{display:flex;align-items:center;gap:10px;margin-top:12px;padding:10px 14px;background:var(--card);border-radius:12px;border:1px solid var(--border)}
.lvbadge{font-size:11px;font-weight:900;color:var(--gold);background:rgba(251,191,36,.15);border-radius:8px;padding:3px 8px;flex-shrink:0}
.lvbw{flex:1;background:rgba(255,255,255,.1);border-radius:999px;height:6px}
.lvbf{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--gold),#fb923c);transition:width .6s}
.lvnxt{font-size:11px;color:var(--t2);font-weight:700;flex-shrink:0}

/* QUIZ IDLE */
.idle-wrap{text-align:center;padding:48px 16px}
.idle-em{font-size:80px;line-height:1;margin-bottom:16px;animation:fl 3s ease-in-out infinite;display:block}
.idle-t{font-size:22px;font-weight:900;margin-bottom:8px}
.idle-s{font-size:14px;color:var(--t2);font-weight:700;margin-bottom:28px}
.btn-startq{border:none;border-radius:16px;padding:18px 40px;font-size:20px;font-weight:900;cursor:pointer;font-family:inherit;color:white;background:linear-gradient(135deg,#7c3aed,#4f46e5);box-shadow:0 8px 24px rgba(124,58,237,.4);touch-action:manipulation;-webkit-appearance:none;user-select:none;transition:.15s}
.btn-startq:active{transform:scale(.97)}

/* QUIZ ACTIVE */
.qtop{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding-top:2px}
.btn-back{border:none;background:var(--card);color:var(--t1);border-radius:12px;padding:8px 14px;font-size:18px;cursor:pointer;font-family:inherit;-webkit-appearance:none;touch-action:manipulation;border:1px solid var(--border)}
.qtag{flex:1;text-align:center;font-size:15px;font-weight:900}
.qbadge{display:flex;align-items:center;gap:4px;background:var(--card);border-radius:999px;padding:6px 12px;font-size:14px;font-weight:900;border:1px solid var(--border)}

.qmon-wrap{text-align:center;margin-bottom:12px}
.qmon{font-size:52px;line-height:1;display:inline-block}
.qmon.bou{animation:bou .35s ease}
.qmon.shk{animation:shk .35s ease}
@keyframes bou{0%,100%{transform:scale(1)}50%{transform:scale(1.3)}}
@keyframes shk{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}

.qinstr{font-size:14px;font-weight:700;color:var(--t2);text-align:center;margin-bottom:6px;min-height:20px}
.qhint{font-size:12px;font-weight:700;color:var(--t2);text-align:center;margin-bottom:12px}

.ans-area{min-height:62px;border:2.5px dashed rgba(124,58,237,.45);border-radius:16px;padding:10px 12px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;background:rgba(124,58,237,.04);margin-bottom:12px;transition:.25s}
.ans-area.ok{border-color:var(--ok);background:rgba(38,222,129,.07)}
.ans-area.err{border-color:var(--err);background:rgba(255,107,107,.07);animation:shakeRow .4s ease}
@keyframes shakeRow{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
.ans-ph{color:rgba(255,255,255,.22);font-size:13px;font-weight:700;width:100%;text-align:center;pointer-events:none}
.achip{background:linear-gradient(135deg,#4f46e5,#7c3aed);color:white;border-radius:10px;padding:9px 13px;font-size:15px;font-weight:800;cursor:pointer;border:none;font-family:inherit;touch-action:manipulation;-webkit-appearance:none;user-select:none;transition:.12s;display:flex;align-items:center;gap:5px}
.achip:active{transform:scale(.91)}
.achip-x{font-size:10px;opacity:.65}

.pool{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;min-height:48px}
.pchip{background:var(--card);border:2px solid var(--border);color:var(--t1);border-radius:12px;padding:9px 15px;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;touch-action:manipulation;-webkit-appearance:none;user-select:none;transition:.12s}
.pchip:active{transform:scale(.91)}
.pchip.used{opacity:.28;pointer-events:none}

.qctrl{display:flex;gap:8px;margin-bottom:10px}
.bsm{flex:1;border:none;border-radius:12px;padding:12px;font-size:13px;font-weight:800;cursor:pointer;font-family:inherit;-webkit-appearance:none;touch-action:manipulation;user-select:none;transition:.12s}
.bsm:active{transform:scale(.96)}
.b-listen{background:var(--card);color:#60a5fa;border:1px solid rgba(96,165,250,.3)}
.b-reset{background:var(--card);color:var(--t2);border:1px solid var(--border)}

.sprow{display:flex;justify-content:center;gap:8px}
.spchip{border:2px solid var(--border);border-radius:10px;padding:7px 14px;font-size:13px;font-weight:800;cursor:pointer;background:var(--card);color:var(--t2);-webkit-appearance:none;touch-action:manipulation;user-select:none;font-family:inherit;transition:.12s}
.spchip:active{transform:scale(.93)}
.spchip.on{border-color:var(--purple);color:white;background:var(--purple)}

/* RESULT OVERLAY */
.roverlay{position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;height:100%;background:rgba(8,6,25,.88);z-index:200;display:flex;align-items:center;justify-content:center;padding:24px;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);opacity:0;pointer-events:none;transition:opacity .22s}
.roverlay.on{opacity:1;pointer-events:auto}
.rcard{background:var(--card);border:1px solid var(--border);border-radius:28px;padding:30px 22px;text-align:center;width:100%;max-width:340px;transform:scale(.8);transition:transform .3s cubic-bezier(.175,.885,.32,1.275)}
.roverlay.on .rcard{transform:scale(1)}
.rem{font-size:64px;line-height:1;margin-bottom:10px;display:block;animation:pop .4s ease}
@keyframes pop{0%{transform:scale(0)}60%{transform:scale(1.2)}100%{transform:scale(1)}}
.rtitle{font-size:24px;font-weight:900;margin-bottom:8px}
.rtitle.ok{color:var(--ok)}.rtitle.err{color:var(--err)}
.rsen{font-size:15px;font-weight:700;color:var(--t2);margin-bottom:12px;line-height:1.6}
.rpts{font-size:18px;font-weight:900;color:var(--gold);margin-bottom:4px}
.rstrk{font-size:13px;font-weight:800;color:#fb923c;margin-bottom:16px;min-height:18px}
.rsave{display:block;width:100%;border:none;border-radius:12px;padding:12px;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;color:var(--ok);background:rgba(38,222,129,.1);border:1px solid rgba(38,222,129,.25);margin-bottom:8px;touch-action:manipulation;-webkit-appearance:none;user-select:none;transition:.12s}
.rsave:active{transform:scale(.97)}
.rsave:disabled{opacity:.5;pointer-events:none}
.bretry{display:block;width:100%;border:none;border-radius:14px;padding:15px;font-size:16px;font-weight:900;cursor:pointer;font-family:inherit;color:var(--t1);background:rgba(255,255,255,.07);border:1px solid var(--border);margin-bottom:8px;touch-action:manipulation;-webkit-appearance:none;user-select:none}
.bnext{display:block;width:100%;border:none;border-radius:14px;padding:15px;font-size:16px;font-weight:900;cursor:pointer;font-family:inherit;color:white;background:linear-gradient(135deg,#7c3aed,#4f46e5);touch-action:manipulation;-webkit-appearance:none;user-select:none;transition:.12s}
.bnext:active{transform:scale(.97)}

/* COLLECTION */
.mgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.mcell{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px 8px;text-align:center}
.mcell.lck{opacity:.35}
.mcem{font-size:38px;line-height:1;margin-bottom:5px;display:block}
.mcnm{font-size:11px;font-weight:800;margin-bottom:4px}
.mccnt{font-size:10px;color:var(--t2);font-weight:700}
.mcst{font-size:9px;font-weight:800;border-radius:999px;padding:2px 8px;display:inline-block;margin-top:4px}
.mcst.eg{background:rgba(255,255,255,.08);color:var(--t2)}
.mcst.ha{background:rgba(38,222,129,.18);color:var(--ok)}
.mcst.ev{background:rgba(251,191,36,.18);color:var(--gold)}
.sitem{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:12px 14px;margin-bottom:8px;font-size:14px;font-weight:700;line-height:1.5}
.sitem-g{font-size:10px;font-weight:800;color:var(--t2);margin-bottom:3px}
.btn-danger{width:100%;border:none;border-radius:12px;padding:13px;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;color:var(--err);background:rgba(255,107,107,.1);border:1px solid rgba(255,107,107,.25);margin-top:10px;touch-action:manipulation;-webkit-appearance:none;user-select:none;transition:.12s}
.btn-danger:active{transform:scale(.97)}

/* SETTINGS */
.ssec{margin-bottom:14px}
.ssec h3{font-size:14px;font-weight:800;margin-bottom:10px}
.ocr-off{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:14px;padding:16px;text-align:center;color:var(--t2);font-size:13px;font-weight:700;line-height:1.7}
.ocr-off .li{font-size:32px;margin-bottom:6px;display:block}
textarea#wordList{width:100%;min-height:140px;border:1px solid var(--border);border-radius:14px;padding:12px;font-size:13px;line-height:1.6;font-family:inherit;-webkit-appearance:none;background:rgba(255,255,255,.04);color:var(--t1);resize:vertical}
textarea#wordList:focus{outline:2px solid var(--purple);outline-offset:-2px}
.bsec{width:100%;border:none;border-radius:12px;padding:12px;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;color:var(--t1);background:var(--card);border:1px solid var(--border);margin-top:8px;touch-action:manipulation;-webkit-appearance:none;user-select:none;transition:.12s}
.bsec:active{transform:scale(.97)}
.stgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.stitem{background:rgba(255,255,255,.04);border-radius:12px;padding:12px;text-align:center}
.stnum{font-size:22px;font-weight:900;color:var(--gold);display:block}
.stlbl{font-size:9px;font-weight:800;color:var(--t2);text-transform:uppercase;letter-spacing:.05em}

/* CONFETTI */
.cfp{position:fixed;top:10%;width:10px;height:10px;border-radius:2px;z-index:9999;pointer-events:none;animation:cff linear forwards}
@keyframes cff{0%{opacity:1;transform:rotate(0) translateX(0)}100%{top:108%;opacity:0;transform:rotate(720deg) translateX(var(--tx,0px))}}
</style>
</head>
<body>
<div id="app">

<!-- HOME -->
<div id="scr-home" class="scr on">
  <div class="topbar">
    <div class="badge"><span>🔥</span><span style="color:#fb923c" id="h-str">0</span></div>
    <div class="appname">Word Monsters</div>
    <div class="badge"><span>⭐</span><span style="color:var(--gold)" id="h-sc">0</span></div>
  </div>

  <div class="hero">
    <span class="hero-em" id="h-mon">🥚</span>
    <div class="hero-nm" id="h-monnm">Dragling · 알 상태</div>
    <div class="bar-wrap"><div class="bar-fill" id="h-hbar" style="width:0%"></div></div>
    <div class="bar-hint" id="h-hhint">5번 맞추면 부화해요!</div>
  </div>

  <div class="slabel">학년 선택</div>
  <div class="grade-row" id="gcards"></div>

  <button class="btn-play" id="h-start">🎮 퀴즈 시작!</button>

  <div class="lvrow">
    <div class="lvbadge" id="h-lv">Lv.1</div>
    <div class="lvbw"><div class="lvbf" id="h-lvb" style="width:0%"></div></div>
    <div class="lvnxt" id="h-lvn">50점까지</div>
  </div>
</div>

<!-- QUIZ -->
<div id="scr-quiz" class="scr">
  <div id="qidle" class="idle-wrap">
    <span class="idle-em" id="qi-mon">🥚</span>
    <div class="idle-t">퀴즈 준비 완료!</div>
    <div class="idle-s">문장을 듣고 단어를<br>순서대로 맞춰봐요</div>
    <button class="btn-startq" id="qi-go">🎮 시작!</button>
  </div>

  <div id="qactive" style="display:none">
    <div class="qtop">
      <button class="btn-back" id="q-back">←</button>
      <div class="qtag" id="q-tag" style="color:var(--g1)">1학년</div>
      <div class="qbadge">🔥<span id="q-str">0</span></div>
    </div>
    <div class="qmon-wrap"><span class="qmon" id="q-mon">🥚</span></div>
    <div class="qinstr" id="q-instr">들은 순서대로 단어를 눌러요!</div>
    <div class="qhint" id="q-hint"></div>
    <div class="ans-area" id="ans-area"><span class="ans-ph">여기에 단어를 넣어요</span></div>
    <div class="pool" id="pool"></div>
    <div class="qctrl">
      <button class="bsm b-listen" id="q-listen">🔊 다시 듣기</button>
      <button class="bsm b-reset" id="q-reset">↩ 초기화</button>
    </div>
    <div class="sprow" id="sprow">
      <button class="spchip" data-sp="slow">🐢 천천히</button>
      <button class="spchip on" data-sp="normal">🚶 보통</button>
      <button class="spchip" data-sp="fast">🐇 빠르게</button>
    </div>
  </div>

  <div id="rover" class="roverlay">
    <div class="rcard">
      <span class="rem" id="r-em">🎉</span>
      <div class="rtitle" id="r-tit">정답!</div>
      <div class="rsen" id="r-sen"></div>
      <div class="rpts" id="r-pts"></div>
      <div class="rstrk" id="r-strk"></div>
      <button class="rsave" id="r-save">📌 문장 저장</button>
      <button class="bretry" id="r-retry" style="display:none">↩ 다시 해볼게요</button>
      <button class="bnext" id="r-next">다음 문제 →</button>
    </div>
  </div>
</div>

<!-- COLLECTION -->
<div id="scr-collection" class="scr">
  <div class="stitle">🐲 몬스터 도감</div>
  <div class="mgrid" id="mgrid"></div>
  <div class="stitle">📝 저장한 문장</div>
  <div id="slist"></div>
  <button class="btn-danger" id="clr-saved">저장 문장 지우기</button>
</div>

<!-- SETTINGS -->
<div id="scr-settings" class="scr">
  <div class="stitle">⚙️ 설정</div>
  <div class="ssec card">
    <h3>📸 OCR 단어 추출</h3>
    <div class="ocr-off"><span class="li">🔒</span>OCR은 로컬 서버가 필요합니다.<br>단어 목록을 직접 수정해 주세요.</div>
  </div>
  <div class="ssec card" style="margin-top:12px">
    <h3>📋 단어 목록</h3>
    <textarea id="wordList" autocorrect="off" autocapitalize="off" autocomplete="off" spellcheck="false">a, me, go, am, and, which, now, big, one, school,
the, we, come, are, but, how, today, small, two, teacher,
I, he, see, can, or, what, tomorrow, good, three, class,
you, she, look, do, so, who, yesterday, bad, many, friend,
is, they, like, want, for, yes, always, hot, much, book,
it, this, play, need, with, no, often, cold, more, desk,
to, that, have, know, from, please, sometimes, fast, most, home,
in, your, make, think, of, student, again, slow, all, family,
on, his, get, use, at, when, then, happy, some, time,
my, her, help, take, about, where, soon, sad, every, pencil</textarea>
    <button class="bsec" id="rst-words">단어 목록 초기화</button>
  </div>
  <div class="ssec card" style="margin-top:12px">
    <h3>📊 게임 통계</h3>
    <div class="stgrid" id="stgrid"></div>
    <button class="btn-danger" id="rst-game">게임 기록 초기화</button>
  </div>
</div>

// ── STATE ─────────────────────────────────────────────────
var S={score:0,streak:0,best:0,correct:0,answered:0,gc:[0,0,0,0,0,0],grade:1,saved:[],speed:'normal'};

function loadS(){
  try{
    var d=JSON.parse(localStorage.getItem('wm2')||'{}');
    ['score','streak','best','correct','answered','gc','grade','saved','speed'].forEach(function(k){if(d[k]!=null)S[k]=d[k];});
    var wl=localStorage.getItem('wm2_w');if(wl)document.getElementById('wordList').value=wl;
  }catch(e){}
}
function saveS(){
  try{localStorage.setItem('wm2',JSON.stringify(S));localStorage.setItem('wm2_w',document.getElementById('wordList').value);}catch(e){}
}

// ── MONSTER HELPERS ───────────────────────────────────────
function getMon(i){
  var c=S.gc[i]||0,m=MONS[i];
  if(c>=15)return{em:m.ev,stage:'ev',lbl:'진화 완료! ✨'};
  if(c>=5) return{em:m.born,stage:'ha',lbl:'부화 완료! 🐣'};
  return{em:m.egg,stage:'eg',lbl:c+'/5 → 부화!'};
}
function getMonPct(i){var c=S.gc[i]||0;if(c>=15)return 100;if(c>=5)return 33+((c-5)/10)*34;return(c/5)*33;}
function getLevel(){return Math.floor(S.score/100)+1;}
function getLvPct(){return S.score%100;}
function getLvLeft(){return 100-(S.score%100);}

// ── WORD/SENTENCE LOGIC ──────────────────────────────────
function cw(w){return String(w).toLowerCase().replace(/[^a-z]/g,'');}
function bw(w){var c=cw(w);return WF[c]||c;}
function isFW(w){return FW.indexOf(cw(w))!==-1;}
function isKnown(w){return getDW().indexOf(bw(w))!==-1;}
function getDW(){
  var ws=getWFT(document.getElementById('wordList').value).concat(VW).concat(RW).concat(EW),d=[];
  for(var i=0;i<ws.length;i++){var w=bw(ws[i]);if(w&&d.indexOf(w)===-1)d.push(w);}return d;
}
function getWFT(raw){
  raw=String(raw||'').replace(/[''""]/g,'').replace(/[  ]/g,' ');
  var p=raw.split(/[,\n;\s]+/),a=[];
  for(var i=0;i<p.length;i++){var w=cw(p[i]);if(w&&a.indexOf(w)===-1)a.push(w);}return a;
}
function svow(w){return/^[aeiou]/.test(cw(w));}
function isPl(w){var c=cw(w);return c.length>2&&/s$/.test(c)&&!/ss$/.test(c);}
function np(w){var c=cw(w);if(!c)return'';if(isPl(c))return c;return(svow(c)?'an ':'a ')+c;}
function pl(w){var c=cw(w);if(!c)return'';if(isPl(c))return c;if(/[^aeiou]y$/.test(c))return c.slice(0,-1)+'ies';if(/(s|x|z|ch|sh)$/.test(c))return c+'es';return c+'s';}
function isVb(w){return VW.indexOf(cw(w))!==-1;}
function isRole(w){return RW.indexOf(cw(w))!==-1;}
function dynTpl(wu){
  var w=cw(wu);
  if(isVb(w))return[['I','want','to',w],['We','want','to',w],['You','can',w],['We','can',w],['Please',w],['Do','you','want','to',w]];
  if(isRole(w)){var r=np(w);return[['I','want','to','be',r],['We','want','to','be',r],['He','is',r],['She','is',r],['Can','you','be',r]];}
  var n=np(w),p2=pl(w);return[['This','is',n],['I','like',p2],['We','like',p2],['You','like',p2],['Look','at',n],['I','see',n],['I','want',n]];
}
function okPat(p,a){for(var i=0;i<p.length;i++){if(a.indexOf(bw(p[i]))===-1)return false;}return true;}
function getAdded(){
  var orig=getWFT(OW),cur=getWFT(document.getElementById('wordList').value),add=[];
  for(var i=0;i<cur.length;i++){if(orig.indexOf(cur[i])===-1&&isKnown(cur[i])&&!isFW(cur[i]))add.push(cur[i]);}
  return add.slice(-20);
}
function genSentence(grade){
  var a=getWFT(document.getElementById('wordList').value),cw2=getAdded(),ps=GP[grade],ok=[],okr=[];
  for(var i=0;i<ps.length;i++){if(okPat(ps[i],a))ok.push(ps[i]);}
  if(cw2.length>0){
    for(var r=0;r<ok.length;r++){var ps2=ok[r].join(',').toLowerCase();for(var w=0;w<cw2.length;w++){if(ps2.indexOf(cw2[w])!==-1){okr.push(ok[r]);break;}}}
    if(okr.length>0)ok=ok.concat(okr);
    for(var ci=0;ci<cw2.length;ci++){var t=dynTpl(cw2[ci]);for(var ti=0;ti<t.length;ti++)ok.push(t[ti]);}
  }
  if(!ok.length&&a.length>0){var src=cw2.length>0?cw2:a;var wu=src[Math.floor(Math.random()*src.length)];var dt=dynTpl(wu);ok=[dt[Math.floor(Math.random()*dt.length)]];}
  if(!ok.length)return null;
  var p=ok[Math.floor(Math.random()*ok.length)];
  var s=p.join(' ');s+=['Which','What','Who','How','Where','When','Can','Do','Is','Are'].indexOf(p[0])!==-1?'?':'.';
  return s;
}

// ── QUIZ STATE ────────────────────────────────────────────
var Q={sen:'',words:[],ans:[],aidx:[],used:[],active:false};

function shuffle(arr){
  var a=arr.slice();
  for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}
  if(a.length>1&&a.join(' ')===arr.join(' ')){var f=a[0];a[0]=a[1];a[1]=f;}
  return a;
}
function tokSen(s){return String(s||'').replace(/[?.!]/g,'').trim().split(/\s+/).filter(Boolean);}

// ── AUDIO ─────────────────────────────────────────────────
function speak(text){
  if(!text||!window.speechSynthesis)return;
  var u=new SpeechSynthesisUtterance(text);
  u.lang='en-US';u.rate={slow:0.4,normal:0.75,fast:1.2}[S.speed]||0.75;
  window.speechSynthesis.cancel();window.speechSynthesis.speak(u);
}
function tone(f,d,t,dl){
  try{var AC=window.AudioContext||window.webkitAudioContext;if(!AC)return;var c=new AC(),o=c.createOscillator(),g=c.createGain(),s=c.currentTime+(dl||0);o.type=t||'sine';o.frequency.value=f;g.gain.setValueAtTime(0.001,s);g.gain.exponentialRampToValueAtTime(0.18,s+0.02);g.gain.exponentialRampToValueAtTime(0.001,s+d);o.connect(g);g.connect(c.destination);o.start(s);o.stop(s+d+0.02);}catch(e){}
}
function sndOK(){tone(660,.12,'sine',0);tone(880,.16,'sine',.12);}
function sndErr(){tone(220,.18,'sawtooth',0);tone(160,.22,'sawtooth',.15);}

// ── CONFETTI ──────────────────────────────────────────────
function confetti(){
  var cl=['#fbbf24','#26de81','#7c3aed','#ff6b6b','#45aaf2','#ec4899','#ff9f43'];
  for(var i=0;i<36;i++){
    var el=document.createElement('div');el.className='cfp';
    el.style.cssText='left:'+Math.random()*100+'%;background:'+cl[i%cl.length]+';animation-delay:'+Math.random()*.4+'s;animation-duration:'+(0.9+Math.random()*.8)+'s;--tx:'+(Math.random()*120-60)+'px;';
    document.body.appendChild(el);setTimeout(function(e){e&&e.remove()},2400,el);
  }
}

// ── NAVIGATE ─────────────────────────────────────────────
function go(name){
  document.querySelectorAll('.scr').forEach(function(s){s.classList.remove('on')});
  document.querySelectorAll('.nb').forEach(function(b){b.classList.toggle('on',b.dataset.s===name)});
  document.getElementById('scr-'+name).classList.add('on');
  if(name==='home')renderHome();
  else if(name==='collection')renderCol();
  else if(name==='settings')renderSet();
  else if(name==='quiz')renderQIdle();
}

// ── RENDER HOME ───────────────────────────────────────────
function renderHome(){
  var gi=S.grade-1,m=getMon(gi);
  document.getElementById('h-str').textContent=S.streak;
  document.getElementById('h-sc').textContent=S.score;
  document.getElementById('h-mon').textContent=m.em;
  document.getElementById('h-monnm').textContent=MONS[gi].name+' · '+m.lbl;

  document.getElementById('h-hhint').textContent=m.stage==='ev'?'최고 단계 달성! 🎊':m.stage==='ha'?'15번 맞추면 진화해요!':'5번 맞추면 부화해요!';
  var lv=getLevel();
  document.getElementById('h-lv').textContent='Lv.'+lv;
  document.getElementById('h-lvb').style.width=getLvPct()+'%';
  document.getElementById('h-lvn').textContent=getLvLeft()+'점까지';
  var cont=document.getElementById('gcards');cont.innerHTML='';
  for(var i=1;i<=6;i++){
    var m2=getMon(i-1),btn=document.createElement('button');
    btn.className='gc'+(S.grade===i?' sel':'');
    btn.style.color=GCOL[i-1];btn.dataset.g=i;
    btn.innerHTML='<span class="gm">'+m2.em+'</span><span class="gn">'+i+'</span><span class="gl">학년</span>';
    btn.addEventListener('click',function(){S.grade=parseInt(this.dataset.g);saveS();renderHome();});
    cont.appendChild(btn);
  }
}

// ── RENDER QUIZ ───────────────────────────────────────────
function renderQIdle(){
  if(Q.active){
    document.getElementById('qidle').style.display='none';
    document.getElementById('qactive').style.display='';
    renderBoard();return;
  }
  document.getElementById('qidle').style.display='';
  document.getElementById('qactive').style.display='none';
  document.getElementById('qi-mon').textContent=getMon(S.grade-1).em;
}

function startQ(){
  var sen=genSentence(S.grade);if(!sen)return;
  Q.sen=sen;Q.words=shuffle(tokSen(sen));Q.ans=[];Q.aidx=[];Q.used=[];Q.active=true;
  var gi=S.grade-1;
  document.getElementById('qidle').style.display='none';
  document.getElementById('qactive').style.display='';
  document.getElementById('q-tag').textContent=S.grade+'학년';
  document.getElementById('q-tag').style.color=GCOL[gi];
  document.getElementById('q-str').textContent=S.streak;
  document.getElementById('q-mon').textContent=getMon(gi).em;
  document.getElementById('q-instr').textContent='들은 순서대로 단어를 눌러요!';
  document.getElementById('q-hint').textContent='단어 '+Q.words.length+'개';
  renderBoard();
  speak(Q.sen);
}

function renderBoard(){
  var aa=document.getElementById('ans-area'),pool=document.getElementById('pool');
  aa.classList.remove('ok','err');
  aa.innerHTML=Q.ans.length===0?'<span class="ans-ph">여기에 단어를 넣어요</span>':'';
  for(var j=0;j<Q.ans.length;j++){
    var ch=document.createElement('button');ch.className='achip';
    ch.innerHTML=Q.ans[j]+'<span class="achip-x">✕</span>';ch.dataset.ai=j;
    ch.addEventListener('click',function(){remAns(parseInt(this.dataset.ai));});
    aa.appendChild(ch);
  }
  pool.innerHTML='';
  for(var i=0;i<Q.words.length;i++){
    var btn=document.createElement('button');btn.className='pchip'+(Q.used.indexOf(i)!==-1?' used':'');
    btn.textContent=Q.words[i];btn.dataset.wi=i;
    btn.addEventListener('click',function(){pickWord(parseInt(this.dataset.wi));});
    pool.appendChild(btn);
  }
}

function pickWord(i){
  if(Q.used.indexOf(i)!==-1)return;
  Q.used.push(i);Q.ans.push(Q.words[i]);Q.aidx.push(i);
  renderBoard();
  if(Q.ans.length===Q.words.length)autoChk();
}

function remAns(ai){
  var oi=Q.aidx[ai];Q.ans.splice(ai,1);Q.aidx.splice(ai,1);
  var ui=Q.used.indexOf(oi);if(ui!==-1)Q.used.splice(ui,1);
  renderBoard();
}

function resetAns(){Q.ans=[];Q.aidx=[];Q.used=[];renderBoard();}

function autoChk(){
  var cor=tokSen(Q.sen).join(' ').toLowerCase(),ans=Q.ans.join(' ').toLowerCase();
  showResult(ans===cor);
}

function showResult(ok){
  var pts=0,gi=S.grade-1;
  if(ok){
    S.streak++;if(S.streak>S.best)S.best=S.streak;
    S.correct++;S.gc[gi]=(S.gc[gi]||0)+1;
    pts=10+Math.min(S.streak-1,5)*2;S.score+=pts;
    document.getElementById('ans-area').classList.add('ok');
    sndOK();confetti();
    var qm=document.getElementById('q-mon');qm.classList.remove('bou');void qm.offsetWidth;qm.classList.add('bou');
  }else{
    S.streak=0;
    document.getElementById('ans-area').classList.add('err');
    sndErr();
    var qm2=document.getElementById('q-mon');qm2.classList.remove('shk');void qm2.offsetWidth;qm2.classList.add('shk');
  }
  S.answered++;
  document.getElementById('q-str').textContent=S.streak;
  saveS();
  var m=getMon(gi);
  document.getElementById('r-em').textContent=ok?m.em:'😢';
  document.getElementById('r-tit').textContent=ok?'정답이에요! 🎉':'아쉬워요...';
  document.getElementById('r-tit').className='rtitle '+(ok?'ok':'err');
  document.getElementById('r-sen').textContent=Q.sen;
  document.getElementById('r-pts').textContent=ok?'+'+pts+'점 획득!':'';
  document.getElementById('r-strk').textContent=ok&&S.streak>1?'🔥 '+S.streak+'연속 정답!':'';
  var rsave=document.getElementById('r-save');
  rsave.textContent='📌 문장 저장';rsave.disabled=false;
  rsave.style.display=ok?'block':'none';
  document.getElementById('r-retry').style.display=ok?'none':'block';
  document.getElementById('r-next').textContent=ok?'다음 문제 →':'다른 문제 →';
  document.getElementById('rover').classList.add('on');
}

function hideResult(){document.getElementById('rover').classList.remove('on');}

// ── RENDER COLLECTION ─────────────────────────────────────
function renderCol(){
  var grid=document.getElementById('mgrid');grid.innerHTML='';
  for(var i=0;i<6;i++){
    var m=getMon(i),c=S.gc[i]||0,cell=document.createElement('div');
    cell.className='mcell'+(c===0?' lck':'');
    var slbl={eg:'🥚 알',ha:'🐣 부화',ev:'✨ 진화'};
    cell.innerHTML='<span class="mcem">'+m.em+'</span>'
      +'<div class="mcnm" style="color:'+MONS[i].color+'">'+MONS[i].name+'</div>'
      +'<div class="mccnt">'+c+'번 정답</div>'
      +'<div class="mcst '+m.stage+'">'+slbl[m.stage]+'</div>';
    grid.appendChild(cell);
  }
  var sl=document.getElementById('slist');sl.innerHTML='';
  if(!S.saved.length){sl.innerHTML='<div style="color:var(--t2);font-size:13px;font-weight:700;text-align:center;padding:20px">저장된 문장이 없어요</div>';return;}
  for(var j=S.saved.length-1;j>=0;j--){
    var it=S.saved[j],div=document.createElement('div');div.className='sitem';
    div.innerHTML='<div class="sitem-g">'+it.g+'학년</div>'+it.s;sl.appendChild(div);
  }
}

// ── RENDER SETTINGS ───────────────────────────────────────
function renderSet(){
  var acc=S.answered>0?Math.round(S.correct/S.answered*100):0;
  document.getElementById('stgrid').innerHTML=
    '<div class="stitem"><span class="stnum">'+S.correct+'</span><span class="stlbl">정답</span></div>'+
    '<div class="stitem"><span class="stnum">'+S.best+'</span><span class="stlbl">최고연속</span></div>'+
    '<div class="stitem"><span class="stnum">'+acc+'%</span><span class="stlbl">정확도</span></div>';
}

// ── EVENTS ────────────────────────────────────────────────
document.querySelectorAll('.nb').forEach(function(b){b.addEventListener('click',function(){go(this.dataset.s);});});

document.getElementById('h-start').addEventListener('click',function(){go('quiz');startQ();});
document.getElementById('qi-go').addEventListener('click',startQ);
document.getElementById('q-back').addEventListener('click',function(){Q.active=false;hideResult();go('home');});
document.getElementById('q-listen').addEventListener('click',function(){if(Q.sen)speak(Q.sen);});
document.getElementById('q-reset').addEventListener('click',resetAns);

document.querySelectorAll('.spchip').forEach(function(b){
  b.addEventListener('click',function(){
    S.speed=this.dataset.sp;
    document.querySelectorAll('.spchip').forEach(function(x){x.classList.remove('on');});
    this.classList.add('on');saveS();
  });
});

document.getElementById('r-save').addEventListener('click',function(){
  S.saved.push({g:S.grade,s:Q.sen});
  if(S.saved.length>60)S.saved.shift();
  saveS();this.textContent='✓ 저장됨!';this.disabled=true;
});
document.getElementById('r-retry').addEventListener('click',function(){hideResult();resetAns();});
document.getElementById('r-next').addEventListener('click',function(){hideResult();startQ();});
document.getElementById('clr-saved').addEventListener('click',function(){
  if(confirm('저장된 문장을 모두 지울까요?')){S.saved=[];saveS();renderCol();}
});
document.getElementById('rst-words').addEventListener('click',function(){
  document.getElementById('wordList').value=OW;saveS();
});
document.getElementById('wordList').addEventListener('change',saveS);
document.getElementById('rst-game').addEventListener('click',function(){
  if(confirm('게임 기록을 초기화할까요?')){
    S.score=0;S.streak=0;S.best=0;S.correct=0;S.answered=0;S.gc=[0,0,0,0,0,0];S.saved=[];
    saveS();renderSet();
  }
});

// Init speed chips
document.querySelectorAll('.spchip').forEach(function(b){b.classList.toggle('on',b.dataset.sp===S.speed);});

// ── INIT ─────────────────────────────────────────────────
loadS();
renderHome();

if('serviceWorker' in navigator){
  window.addEventListener('load',function(){navigator.serviceWorker.register('./service-worker.js').catch(function(){});});
}
</script>
</body>
</html>
