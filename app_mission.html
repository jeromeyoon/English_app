<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#3f7cff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="영어 미션">
<link rel="manifest" href="./manifest.json">
<link rel="icon" href="./icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="./icon.svg">
<title>영어 탐험 미션</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap');
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--blue:#3f7cff;--green:#33b879;--yellow:#ffd74d;--ink:#20263a;--muted:#6c7284;--line:#dfe6f5;--panel:#fff}
body{margin:0;font-family:'Nunito',Arial,sans-serif;background:#eaf3ff;color:var(--ink)}
header{padding:18px 14px 0}
main{max-width:1100px;margin:0 auto;padding:14px 14px 80px}
.hero{position:relative;overflow:hidden;border-radius:24px;min-height:280px;color:white;background:#3f7cff;box-shadow:0 12px 34px rgba(42,73,132,.22)}
.hero::before{content:"";position:absolute;inset:0;background:
  linear-gradient(90deg,rgba(24,45,92,.82),rgba(43,91,170,.56) 48%,rgba(34,144,92,.25)),
  url("./mission_hero.png") center/cover no-repeat}
.hero-art{position:absolute;inset:0;opacity:.98}
.hero-content{position:relative;z-index:2;padding:22px;display:grid;grid-template-columns:1fr 220px;gap:14px;align-items:end;min-height:280px}
.eyebrow{display:inline-block;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.35);padding:7px 11px;border-radius:999px;font-size:12px;font-weight:900}
h1{font-size:34px;line-height:1.02;margin:14px 0 8px;font-weight:900;letter-spacing:0}
.hero p{font-size:15px;line-height:1.45;max-width:520px;margin:0;opacity:.94;font-weight:800}
.mascot{justify-self:end;align-self:center;width:205px;height:205px}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px}
.stat{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.3);border-radius:16px;padding:10px}
.stat b{display:block;font-size:24px}.stat span{font-size:12px;font-weight:900;opacity:.9}
.grid{display:grid;grid-template-columns:1.05fr .95fr;gap:14px;margin-top:14px}
.panel{background:var(--panel);border-radius:20px;padding:18px;box-shadow:0 5px 20px rgba(34,52,91,.08)}
.panel h2{margin:0 0 12px;font-size:19px}
.stage-title{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:10px}
.badge{display:inline-flex;align-items:center;gap:6px;border-radius:999px;background:#eef5ff;color:#3155b6;font-size:12px;font-weight:900;padding:7px 10px}
.mission-list{display:grid;gap:10px}
.mission{display:grid;grid-template-columns:54px 1fr auto;gap:12px;align-items:center;border:2px solid var(--line);border-radius:18px;padding:12px;background:#fbfcff}
.mission.done{border-color:#bfe9cf;background:#f3fff7}
.mission-icon{width:54px;height:54px;border-radius:16px;display:grid;place-items:center;font-size:27px;background:#edf4ff}
.mission h3{margin:0;font-size:16px}.mission p{margin:4px 0 0;font-size:13px;color:var(--muted);font-weight:800}
.progress{height:10px;background:#e8edf7;border-radius:999px;overflow:hidden;margin-top:9px}
.bar{height:100%;background:linear-gradient(90deg,var(--green),var(--yellow));width:0}
button,.link-btn{border:0;border-radius:13px;padding:11px 13px;font-size:14px;font-weight:900;font-family:inherit;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;gap:7px;touch-action:manipulation}
button:active,.link-btn:active{transform:scale(.98);opacity:.86}
.primary{background:var(--blue);color:#fff}.secondary{background:#eef1f7;color:#303846}.complete{background:#33b879;color:#fff}.locked{background:#e9edf5;color:#8c94a6;cursor:not-allowed}
.mission-actions{display:flex;flex-direction:column;gap:7px;min-width:92px}
.stage-map{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-top:12px}
.stage{position:relative;min-height:96px;border:2px solid var(--line);border-radius:18px;background:#fbfcff;padding:10px;overflow:hidden}
.stage.active{border-color:var(--blue);background:#f2f7ff}.stage.locked-stage{filter:saturate(.35);opacity:.68}
.stage .num{font-size:12px;font-weight:900;color:var(--muted)}.stage .emoji{font-size:32px;margin:4px 0}.stage .name{font-size:13px;font-weight:900}
.reward{display:grid;grid-template-columns:80px 1fr;gap:14px;align-items:center;background:#fff8dd;border:2px solid #ffe08a;border-radius:18px;padding:14px;margin-top:12px}
.sticker{width:74px;height:74px;border-radius:20px;background:white;display:grid;place-items:center;font-size:38px;border:2px solid #ffd866;box-shadow:0 5px 0 #f3c642}
.stickers{display:flex;flex-wrap:wrap;gap:9px;min-height:54px}
.small-sticker{width:50px;height:50px;border-radius:14px;background:#fff8dd;border:2px solid #ffe08a;display:grid;place-items:center;font-size:26px}
.words{display:flex;flex-wrap:wrap;gap:7px;margin-top:10px}
.word{border-radius:999px;background:#fff0b3;border:1.5px solid #f0c000;color:#5d4a00;padding:6px 10px;font-size:13px;font-weight:900}
.toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%) translateY(120px);background:#1f2937;color:white;padding:13px 16px;border-radius:999px;font-weight:900;box-shadow:0 10px 28px rgba(0,0,0,.22);transition:.25s;z-index:20}
.toast.show{transform:translateX(-50%) translateY(0)}
.actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
@media(max-width:820px){.hero-content{grid-template-columns:1fr;min-height:0}.mascot{position:absolute;right:-24px;bottom:-28px;width:160px;height:160px;opacity:.65}.grid{grid-template-columns:1fr}.stage-map{grid-template-columns:repeat(3,1fr)}h1{font-size:29px}.mission{grid-template-columns:48px 1fr}.mission-actions{grid-column:1/-1;display:grid;grid-template-columns:1fr 1fr}.hero{min-height:300px}.stats{grid-template-columns:repeat(3,1fr);padding-right:82px}}
</style>
</head>
<body>
<header>
  <div class="hero">
    <svg class="hero-art" viewBox="0 0 1000 380" preserveAspectRatio="none" aria-hidden="true">
      <path d="M0 285 C160 240 250 290 380 245 C520 200 620 258 760 210 C865 174 925 192 1000 160 L1000 380 L0 380 Z" fill="rgba(255,255,255,.22)"/>
      <path d="M0 320 C180 270 290 336 450 292 C585 255 690 330 820 280 C900 250 950 255 1000 238 L1000 380 L0 380 Z" fill="rgba(255,255,255,.25)"/>
      <circle cx="160" cy="75" r="34" fill="rgba(255,215,77,.95)"/>
      <path d="M170 265 C255 226 310 230 370 175 C430 120 510 125 570 170 C635 218 700 205 790 150" fill="none" stroke="rgba(255,255,255,.55)" stroke-width="18" stroke-linecap="round" stroke-dasharray="2 34"/>
      <g fill="rgba(255,255,255,.75)">
        <circle cx="370" cy="175" r="17"/><circle cx="570" cy="170" r="17"/><circle cx="790" cy="150" r="17"/>
      </g>
    </svg>
    <div class="hero-content">
      <div>
        <span class="eyebrow">Today's English Adventure</span>
        <h1 id="heroTitle">Park Mission</h1>
        <p id="heroCopy">문장, 퀴즈, 발음, 회화를 완료하고 오늘의 스티커를 모으세요.</p>
        <div class="stats">
          <div class="stat"><b id="starCount">0</b><span>Stars</span></div>
          <div class="stat"><b id="streakCount">1</b><span>Day streak</span></div>
          <div class="stat"><b id="stageCount">1</b><span>Stage</span></div>
        </div>
      </div>
      <svg class="mascot" viewBox="0 0 220 220" aria-label="Explorer robot mascot">
        <defs><linearGradient id="m1" x1="0" x2="1"><stop stop-color="#fff"/><stop offset="1" stop-color="#d8ebff"/></linearGradient></defs>
        <ellipse cx="110" cy="184" rx="62" ry="14" fill="rgba(0,0,0,.18)"/>
        <rect x="59" y="72" width="102" height="96" rx="30" fill="url(#m1)" stroke="#253a72" stroke-width="5"/>
        <rect x="73" y="90" width="74" height="42" rx="18" fill="#253a72"/>
        <circle cx="93" cy="111" r="7" fill="#72e6ff"/><circle cx="127" cy="111" r="7" fill="#72e6ff"/>
        <path d="M88 142 Q110 155 132 142" fill="none" stroke="#253a72" stroke-width="5" stroke-linecap="round"/>
        <path d="M78 68 L66 42 M142 68 L154 42" stroke="#253a72" stroke-width="5" stroke-linecap="round"/>
        <circle cx="65" cy="39" r="9" fill="#ffd74d" stroke="#253a72" stroke-width="4"/>
        <circle cx="155" cy="39" r="9" fill="#33b879" stroke="#253a72" stroke-width="4"/>
        <path d="M58 112 L28 96 M162 112 L192 96" stroke="#253a72" stroke-width="9" stroke-linecap="round"/>
        <circle cx="25" cy="94" r="11" fill="#fff" stroke="#253a72" stroke-width="5"/><circle cx="195" cy="94" r="11" fill="#fff" stroke="#253a72" stroke-width="5"/>
        <path d="M82 168 L76 197 M138 168 L144 197" stroke="#253a72" stroke-width="9" stroke-linecap="round"/>
      </svg>
    </div>
  </div>
</header>
<main>
  <div class="grid">
    <section class="panel">
      <div class="stage-title">
        <h2 id="stageName">오늘의 미션</h2>
        <span class="badge" id="stageBadge">Stage 1</span>
      </div>
      <div class="words" id="wordList"></div>
      <div class="mission-list" id="missionList"></div>
      <div class="actions">
        <button class="secondary" id="resetTodayBtn" type="button">오늘 미션 초기화</button>
        <button class="secondary" id="resetAllBtn" type="button">전체 기록 초기화</button>
      </div>
    </section>
    <section class="panel">
      <h2>탐험 지도</h2>
      <div class="stage-map" id="stageMap"></div>
      <div class="reward">
        <div class="sticker" id="rewardSticker">🐶</div>
        <div>
          <h2 id="rewardTitle">Dog Sticker</h2>
          <p id="rewardCopy">오늘 미션을 모두 완료하면 스티커와 다음 장소가 열립니다.</p>
          <button class="primary" id="claimBtn" type="button">보상 받기</button>
        </div>
      </div>
      <h2 style="margin-top:18px">스티커 보관함</h2>
      <div class="stickers" id="stickerBox"></div>
    </section>
  </div>
</main>
<div class="toast" id="toast">Saved</div>
<script>
const STORAGE_KEY="englishMissionStateV1";
const stages=[
  {id:1,name:"Park",emoji:"🌳",stickerId:"dog",sticker:"🐶",stickerName:"Dog Sticker",words:["dog","ball","boy","tree","park"]},
  {id:2,name:"Home",emoji:"🏠",stickerId:"apple",sticker:"🍎",stickerName:"Apple Sticker",words:["apple","table","bed","home","family"]},
  {id:3,name:"School",emoji:"🏫",stickerId:"book",sticker:"📚",stickerName:"Book Sticker",words:["book","pencil","teacher","desk","school"]},
  {id:4,name:"Zoo",emoji:"🦁",stickerId:"zoo",sticker:"🐵",stickerName:"Zoo Sticker",words:["lion","monkey","bird","fish","zoo"]},
  {id:5,name:"Space",emoji:"🚀",stickerId:"rocket",sticker:"⭐",stickerName:"Rocket Sticker",words:["star","moon","rocket","robot","space"]}
];
const missionDefs=[
  {id:"sentence",title:"문장 만들기",goal:2,stars:1,icon:"✏️",url:"app.html",copy:"문장 2개를 만들어 보세요."},
  {id:"quiz",title:"듣기 순서 퀴즈",goal:1,stars:2,icon:"🎧",url:"app_voice.html",copy:"들은 문장을 단어 순서대로 맞춰 보세요."},
  {id:"voice",title:"발음 연습",goal:1,stars:2,icon:"🎙️",url:"app_voice.html",copy:"문장을 듣고 따라 말해 보세요."},
  {id:"conversation",title:"AI 회화",goal:2,stars:3,icon:"💬",url:"app_conversation.html",copy:"질문하거나 대답을 2번 해 보세요."}
];

function todayString(){
  var now=new Date();
  return now.getFullYear()+"-"+String(now.getMonth()+1).padStart(2,"0")+"-"+String(now.getDate()).padStart(2,"0");
}

function blankMissions(){
  var missions={};
  for(var i=0;i<missionDefs.length;i++){
    missions[missionDefs[i].id]={done:0,claimed:false};
  }
  return missions;
}

function createDefaultState(date){
  return {
    lastDate:date,
    currentStage:1,
    totalStars:0,
    streak:1,
    unlockedStages:[1],
    completedStages:[],
    stickers:[],
    today:{date:date,stageId:1,missions:blankMissions(),rewardClaimed:false}
  };
}

function loadState(date){
  var raw=localStorage.getItem(STORAGE_KEY);
  var state=raw?JSON.parse(raw):createDefaultState(date);
  if(state.today.date!==date){
    var previous=state.lastDate;
    state.streak=previous?state.streak+1:1;
    state.lastDate=date;
    state.today={date:date,stageId:state.currentStage,missions:blankMissions(),rewardClaimed:false};
  }
  return state;
}

function saveState(state){
  localStorage.setItem(STORAGE_KEY,JSON.stringify(state));
}

function getStage(state){
  return stages.find(function(stage){return stage.id===state.today.stageId;})||stages[0];
}

function assertStageLocked(state,stageId){
  return state.unlockedStages.indexOf(stageId)===-1;
}

function missionComplete(mission){
  var def=missionDefs.find(function(item){return item.id===mission.id;});
  return mission.done>=def.goal;
}

function completeMission(state,missionId){
  var def=missionDefs.find(function(item){return item.id===missionId;});
  var mission=state.today.missions[missionId];
  if(!def||!mission)return false;
  var beforeDone=mission.done>=def.goal;
  if(mission.done<def.goal)mission.done++;
  if(!beforeDone&&mission.done>=def.goal&&!mission.claimed){
    state.totalStars+=def.stars;
    mission.claimed=true;
  }
  saveState(state);
  return true;
}

function allMissionsComplete(state){
  for(var i=0;i<missionDefs.length;i++){
    var def=missionDefs[i],mission=state.today.missions[def.id];
    if(!mission||mission.done<def.goal)return false;
  }
  return true;
}

function claimStageReward(state){
  if(!allMissionsComplete(state)||state.today.rewardClaimed)return false;
  var stage=getStage(state);
  state.today.rewardClaimed=true;
  if(state.stickers.indexOf(stage.stickerId)===-1)state.stickers.push(stage.stickerId);
  if(state.completedStages.indexOf(stage.id)===-1)state.completedStages.push(stage.id);
  var nextId=stage.id+1;
  if(nextId<=stages.length&&state.unlockedStages.indexOf(nextId)===-1)state.unlockedStages.push(nextId);
  if(nextId<=stages.length)state.currentStage=nextId;
  saveState(state);
  return true;
}

function showToast(message){
  var toast=document.getElementById("toast");
  toast.innerText=message;
  toast.classList.add("show");
  setTimeout(function(){toast.classList.remove("show");},1600);
}

function renderWords(stage){
  var box=document.getElementById("wordList");
  box.innerHTML="";
  for(var i=0;i<stage.words.length;i++){
    var span=document.createElement("span");
    span.className="word";
    span.innerText=stage.words[i];
    box.appendChild(span);
  }
}

function renderMissions(state){
  var box=document.getElementById("missionList");
  box.innerHTML="";
  for(var i=0;i<missionDefs.length;i++){
    var def=missionDefs[i];
    var mission=state.today.missions[def.id];
    var pct=Math.min(100,Math.round((mission.done/def.goal)*100));
    var row=document.createElement("div");
    row.className="mission"+(pct>=100?" done":"");
    row.innerHTML='<div class="mission-icon">'+def.icon+'</div><div><h3>'+def.title+'</h3><p>'+def.copy+' 진행 '+mission.done+' / '+def.goal+' · ⭐ '+def.stars+'</p><div class="progress"><div class="bar" style="width:'+pct+'%"></div></div></div>';
    var actions=document.createElement("div");
    actions.className="mission-actions";
    var link=document.createElement("a");
    link.className="link-btn primary";
    link.href=def.url;
    link.innerText="시작";
    var done=document.createElement("button");
    done.type="button";
    done.className=pct>=100?"secondary":"complete";
    done.innerText=pct>=100?"완료됨":"완료했어요";
    done.dataset.missionId=def.id;
    done.addEventListener("click",function(){
      var active=loadState(todayString());
      completeMission(active,this.dataset.missionId);
      renderApp();
      showToast("미션 진행이 저장됐어요");
    });
    actions.appendChild(link);
    actions.appendChild(done);
    row.appendChild(actions);
    box.appendChild(row);
  }
}

function renderStageMap(state){
  var box=document.getElementById("stageMap");
  box.innerHTML="";
  for(var i=0;i<stages.length;i++){
    var stage=stages[i];
    var unlocked=state.unlockedStages.indexOf(stage.id)!==-1;
    var div=document.createElement("div");
    div.className="stage "+(stage.id===state.today.stageId?"active ":"")+(unlocked?"":"locked-stage");
    div.innerHTML='<div class="num">Stage '+stage.id+'</div><div class="emoji">'+stage.emoji+'</div><div class="name">'+stage.name+'</div>';
    div.dataset.stageId=stage.id;
    div.addEventListener("click",function(){
      var active=loadState(todayString());
      var id=parseInt(this.dataset.stageId,10);
      if(active.unlockedStages.indexOf(id)===-1){showToast("아직 잠겨 있어요");return;}
      active.today.stageId=id;
      active.currentStage=id;
      active.today.missions=blankMissions();
      active.today.rewardClaimed=false;
      saveState(active);
      renderApp();
    });
    box.appendChild(div);
  }
}

function renderStickers(state){
  var box=document.getElementById("stickerBox");
  box.innerHTML="";
  if(!state.stickers.length){
    var empty=document.createElement("span");
    empty.className="badge";
    empty.innerText="아직 스티커가 없어요";
    box.appendChild(empty);
    return;
  }
  for(var i=0;i<state.stickers.length;i++){
    var stage=stages.find(function(item){return item.stickerId===state.stickers[i];});
    var sticker=document.createElement("div");
    sticker.className="small-sticker";
    sticker.innerText=stage?stage.sticker:"🏅";
    box.appendChild(sticker);
  }
}

function renderApp(){
  var state=loadState(todayString());
  var stage=getStage(state);
  document.getElementById("heroTitle").innerText=stage.name+" Mission";
  document.getElementById("heroCopy").innerText=stage.name+" 단어로 오늘의 영어 탐험을 완료하세요.";
  document.getElementById("stageName").innerText=stage.emoji+" "+stage.name+" 미션";
  document.getElementById("stageBadge").innerText="Stage "+stage.id;
  document.getElementById("starCount").innerText=state.totalStars;
  document.getElementById("streakCount").innerText=state.streak;
  document.getElementById("stageCount").innerText=state.unlockedStages.length;
  document.getElementById("rewardSticker").innerText=stage.sticker;
  document.getElementById("rewardTitle").innerText=stage.stickerName;
  document.getElementById("claimBtn").className=allMissionsComplete(state)&&!state.today.rewardClaimed?"primary":"locked";
  renderWords(stage);
  renderMissions(state);
  renderStageMap(state);
  renderStickers(state);
}

document.getElementById("claimBtn").addEventListener("click",function(){
  var state=loadState(todayString());
  if(claimStageReward(state)){
    renderApp();
    showToast("스티커를 획득했어요!");
  }else{
    showToast("모든 미션을 먼저 완료하세요");
  }
});
document.getElementById("resetTodayBtn").addEventListener("click",function(){
  var state=loadState(todayString());
  state.today.missions=blankMissions();
  state.today.rewardClaimed=false;
  saveState(state);
  renderApp();
  showToast("오늘 미션을 초기화했어요");
});
document.getElementById("resetAllBtn").addEventListener("click",function(){
  localStorage.removeItem(STORAGE_KEY);
  renderApp();
  showToast("전체 기록을 초기화했어요");
});
renderApp();
if("serviceWorker" in navigator){
  window.addEventListener("load",function(){
    navigator.serviceWorker.register("./service-worker.js").catch(function(){});
  });
}
</script>
</body>
</html>
