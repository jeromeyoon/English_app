<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#4f46e5">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="영어 말하기">
<link rel="manifest" href="./manifest.json">
<link rel="icon" href="./icon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<title>영어 말하기 연습</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body{height:100%;background:#eef2ff;overscroll-behavior:none}
body{font-family:'Nunito',system-ui,sans-serif;color:#1e2940;max-width:430px;margin:0 auto}

:root{
  --g1:#ff6b6b;--g2:#ff9f43;--g3:#e8b800;--g4:#2f9e44;--g5:#1971c2;--g6:#6741d9;
  --ok:#22c55e;--err:#ef4444;--star:#fbbf24;
  --shadow:0 4px 20px rgba(30,41,64,.12);
  --r:18px;
}

/* ── SCREENS ─────────────────────── */
.scr{min-height:100vh;display:none;flex-direction:column}
.scr.on{display:flex}

/* ── HOME ────────────────────────── */
.home-header{padding:20px 20px 0;display:flex;justify-content:space-between;align-items:center}
.app-title{font-size:22px;font-weight:900;background:linear-gradient(135deg,#6366f1,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.stats-row{display:flex;gap:8px}
.stat-pill{background:white;border-radius:999px;padding:7px 13px;font-size:14px;font-weight:900;box-shadow:var(--shadow);display:flex;align-items:center;gap:4px}

.char-card{margin:18px 16px 0;background:linear-gradient(135deg,#6366f1,#8b5cf6);border-radius:var(--r);padding:24px;color:white;text-align:center;position:relative;overflow:hidden}
.char-card::before{content:'';position:absolute;top:-30px;right:-30px;width:130px;height:130px;background:rgba(255,255,255,.1);border-radius:50%;pointer-events:none}
.char-em{font-size:64px;line-height:1;display:block;animation:bob 2.5s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.char-nm{font-size:13px;font-weight:900;opacity:.85;margin:8px 0 14px}
.xp-bar{background:rgba(255,255,255,.25);border-radius:999px;height:8px;overflow:hidden}
.xp-fill{height:100%;border-radius:999px;background:white;transition:width .6s}
.xp-lbl{font-size:11px;opacity:.75;margin-top:5px;font-weight:800}

.section{padding:16px 16px 0}
.sec-label{font-size:11px;font-weight:900;color:#7c8aab;text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px}
.grade-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.grade-row::-webkit-scrollbar{display:none}
.gc{flex-shrink:0;width:58px;border-radius:14px;padding:10px 6px;text-align:center;border:2.5px solid #dfe6f5;background:white;cursor:pointer;transition:.15s;display:flex;flex-direction:column;align-items:center;gap:2px;font-family:inherit;user-select:none;touch-action:manipulation;-webkit-appearance:none}
.gc:active{transform:scale(.9)}
.gc.sel{color:white}
.gc-num{font-size:22px;font-weight:900;line-height:1}
.gc-txt{font-size:10px;font-weight:800;opacity:.7}
.g1{color:var(--g1)}.g1.sel{background:var(--g1);border-color:var(--g1)}
.g2{color:var(--g2)}.g2.sel{background:var(--g2);border-color:var(--g2)}
.g3{color:var(--g3)}.g3.sel{background:var(--g3);border-color:var(--g3)}
.g4{color:var(--g4)}.g4.sel{background:var(--g4);border-color:var(--g4)}
.g5{color:var(--g5)}.g5.sel{background:var(--g5);border-color:var(--g5)}
.g6{color:var(--g6)}.g6.sel{background:var(--g6);border-color:var(--g6)}

.vocab-card{margin-top:12px;background:white;border-radius:var(--r);padding:14px;box-shadow:var(--shadow)}
.vocab-title{font-size:15px;font-weight:900;color:#1e2940}
.vocab-sub{font-size:12px;font-weight:800;color:#7c8aab;margin-top:4px}
.vocab-meta{font-size:11px;font-weight:900;color:#6366f1;margin-top:6px}
.vocab-cats{display:flex;flex-direction:column;gap:10px;margin-top:12px}
.vocab-cat{display:flex;flex-direction:column;gap:6px}
.vocab-cat-label{font-size:11px;font-weight:900;color:#6366f1;text-transform:uppercase;letter-spacing:.05em}
.vocab-panel{border:1.5px solid #e0e7ff;border-radius:14px;background:#fafbff;overflow:hidden}
.vocab-panel summary{list-style:none;cursor:pointer;padding:11px 12px;display:flex;align-items:center;justify-content:space-between}
.vocab-panel summary::-webkit-details-marker{display:none}
.vocab-panel summary::after{content:'＋';font-size:16px;font-weight:900;color:#6366f1}
.vocab-panel[open] summary::after{content:'－'}
.vocab-panel[open]{background:#ffffff;box-shadow:0 6px 16px rgba(99,102,241,.07)}
.vocab-panel .vocab-chips{padding:0 12px 12px}
.vocab-chips{display:flex;flex-wrap:wrap;gap:7px}
.vocab-chip{border:none;background:#eef2ff;color:#4338ca;border-radius:14px;padding:8px 11px;font-size:12px;font-weight:900;display:flex;flex-direction:column;align-items:flex-start;gap:2px;cursor:pointer;font-family:inherit;text-align:left}
.vocab-chip:active{transform:scale(.97)}
.vocab-en{font-size:12px;font-weight:900;color:#4338ca}
.vocab-ko{font-size:11px;font-weight:800;color:#6b7280}

.btn-play{display:block;margin:18px 16px;width:calc(100% - 32px);border:none;border-radius:var(--r);padding:18px;font-size:20px;font-weight:900;cursor:pointer;font-family:inherit;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:white;box-shadow:0 8px 24px rgba(99,102,241,.4);touch-action:manipulation;transition:.15s;-webkit-appearance:none}
.btn-play:active{transform:scale(.97)}

/* ── GAME TOPBAR ─────────────────── */
.topbar{padding:12px 16px;display:flex;align-items:center;gap:8px;background:white;box-shadow:0 2px 12px rgba(30,41,64,.07);position:sticky;top:0;z-index:20}
.btn-back{width:38px;height:38px;border-radius:12px;border:2px solid #dfe6f5;background:white;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;touch-action:manipulation;flex-shrink:0;font-family:inherit;-webkit-appearance:none}
.btn-back:active{transform:scale(.9)}
.tb-pills{flex:1;display:flex;gap:7px}
.tb-pill{background:#f3f4f7;border-radius:999px;padding:6px 10px;font-size:13px;font-weight:900}
.grade-tag{border-radius:999px;padding:6px 12px;font-size:13px;font-weight:900;color:white;flex-shrink:0}

/* ── LEVEL PROGRESS ─────────────── */
.lv-prog{padding:10px 16px 0;display:flex;gap:5px;align-items:center}
.lv-bar{flex:1;height:5px;border-radius:999px;background:#e8ecf5;transition:.4s}
.lv-bar.done{background:var(--ok)}
.lv-bar.active{background:linear-gradient(90deg,#6366f1,#8b5cf6)}
.lv-lbl{font-size:11px;font-weight:900;color:#a0aec0;flex-shrink:0;min-width:44px;text-align:right}

/* ── SCENE CARD (new vertical layout) */
.scene-card{margin:12px 16px 0;background:white;border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden}

.sc-head{display:flex;align-items:center;justify-content:space-between;padding:12px 14px 0}
.sc-label{font-size:15px;font-weight:900;color:#1e2940}

/* Time badge */
.time-badge{display:inline-flex;align-items:center;gap:5px;border-radius:999px;padding:5px 12px;font-size:12px;font-weight:900;flex-shrink:0}
.tb-present{background:#dbeafe;color:#1d4ed8}
.tb-past{background:#fce7f3;color:#9d174d}
.tb-perfect{background:#d1fae5;color:#065f46}

/* Scene illustration */
.scene-ill-wrap{padding:14px 14px 10px}
.scene-ill{position:relative;width:100%;height:190px;border-radius:22px;overflow:hidden;background:linear-gradient(180deg,#dbeafe 0%,#e9f7ff 45%,#fff1c9 100%);box-shadow:0 10px 24px rgba(99,102,241,.10), inset 0 0 0 2px rgba(255,255,255,.75)}
.scene-ill::before{content:'';position:absolute;inset:10px;border-radius:16px;border:1.5px solid rgba(255,255,255,.55);pointer-events:none}
.scene-ill svg{display:block;width:100%;height:100%}
.scene-ill img{display:block;width:100%;height:100%;object-fit:cover}
.scene-stack{position:relative;width:100%;height:100%}
.scene-layer{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
.scene-layer.bg{object-fit:cover}
.scene-layer.main,.scene-layer.prop{object-fit:contain}
.scene-tags{display:flex;flex-wrap:wrap;gap:8px;padding:0 14px 12px}
.scene-tag{background:linear-gradient(135deg,#f5f3ff,#eef2ff);color:#5b21b6;border:1px solid #ddd6fe;border-radius:999px;padding:7px 11px;font-size:12px;font-weight:900;box-shadow:0 4px 10px rgba(99,102,241,.08)}
.used-vocab-box{margin:0 14px 12px;border:1.5px solid #dbeafe;background:#f8fbff;border-radius:14px;overflow:hidden}
.used-vocab-toggle{list-style:none;cursor:pointer;padding:11px 13px;font-size:12px;font-weight:900;color:#1d4ed8;display:flex;align-items:center;justify-content:space-between}
.used-vocab-toggle::-webkit-details-marker{display:none}
.used-vocab-toggle::after{content:'보기';font-size:11px;color:#6366f1}
.used-vocab-box[open] .used-vocab-toggle::after{content:'닫기'}
.used-vocab-list{display:flex;flex-wrap:wrap;gap:8px;padding:0 13px 13px}
.used-vocab-chip{display:flex;flex-direction:column;gap:2px;background:white;border:1.5px solid #dbeafe;border-radius:12px;padding:8px 10px}
.used-vocab-chip .vocab-en{font-size:12px}
.used-vocab-chip .vocab-ko{font-size:11px}

/* Korean hint */
.ko-hint{margin:0 14px 14px;background:#fffbeb;border:1.5px solid #fde68a;border-radius:12px;padding:9px 13px;font-size:13px;font-weight:800;color:#92400e;line-height:1.45}
.ko-hint .ko-icon{margin-right:4px}

/* ── GAME CONTENT ────────────────── */
.content{flex:1;padding:10px 16px 0;display:flex;flex-direction:column}
.step-info{font-size:12px;font-weight:900;color:#a0aec0;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.lv-badge{border-radius:8px;padding:3px 9px;font-size:11px;font-weight:900;color:white}

.sen-box{background:white;border-radius:var(--r);padding:18px 16px;box-shadow:var(--shadow);font-size:21px;font-weight:900;line-height:1.6;color:#1e2940;text-align:center;display:flex;flex-wrap:wrap;justify-content:center;align-items:center;gap:5px;min-height:76px}
.blank{display:inline-flex;align-items:center;justify-content:center;min-width:90px;height:36px;border-radius:12px;border:2.5px dashed #818cf8;background:#eef2ff;color:#4f46e5;font-size:17px;font-weight:900;padding:0 10px;transition:.2s}
.blank.active{animation:pblank .9s ease-in-out infinite alternate}
@keyframes pblank{from{box-shadow:0 0 0 0 rgba(99,102,241,.2)}to{box-shadow:0 0 0 8px rgba(99,102,241,.05)}}
.blank.filled{border-style:solid;border-color:var(--ok);background:#f0fdf4;color:#16a34a}
.blank.wrong-flash{border-color:var(--err);background:#fef2f2;animation:shake .3s ease}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

/* Tense hint box */
.tense-hint{background:#f0fdf4;border:1.5px solid #bbf7d0;border-radius:12px;padding:9px 13px;font-size:12px;font-weight:800;color:#166534;margin-top:12px;line-height:1.4}
.tense-hint b{display:block;margin-bottom:2px;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:#4ade80}

/* Choices */
.choices{display:flex;flex-wrap:wrap;gap:9px;justify-content:center;margin-top:14px}
.ch-btn{border:2.5px solid #dfe6f5;border-radius:14px;padding:12px 16px;font-size:16px;font-weight:900;background:white;cursor:pointer;font-family:inherit;touch-action:manipulation;transition:.15s;min-width:100px;color:#1e2940;-webkit-appearance:none}
.ch-btn:active{transform:scale(.93)}
.ch-btn.dim{opacity:.22;pointer-events:none}
.ch-btn.highlight{border-color:#6366f1;background:#eef2ff;color:#4338ca;animation:pch .7s ease infinite alternate}
@keyframes pch{from{box-shadow:0 0 0 0 rgba(99,102,241,.25)}to{box-shadow:0 0 0 7px rgba(99,102,241,.07)}}
.ch-btn.correct-flash{border-color:var(--ok);background:#f0fdf4;color:#16a34a;transform:scale(1.04)}
.ch-btn.wrong-anim{border-color:var(--err);background:#fef2f2;color:#dc2626;animation:shake .3s ease}

/* Level 3 */
.l3-drop{min-height:52px;background:white;border-radius:14px;border:2.5px dashed #dfe6f5;padding:9px 12px;display:flex;flex-wrap:wrap;gap:7px;align-items:center;box-shadow:var(--shadow)}
.l3-drop.has{border-color:#a5b4fc;background:#eef2ff}
.l3-ph{color:#a0aec0;font-size:13px;font-weight:800}
.word-chip{border:2.5px solid #dfe6f5;border-radius:12px;padding:9px 13px;font-size:15px;font-weight:900;background:white;cursor:pointer;touch-action:manipulation;transition:.15s;font-family:inherit;-webkit-appearance:none}
.word-chip:active{transform:scale(.9)}
.word-chip.used{opacity:.2;pointer-events:none}
.word-chip.ans-chip{border-color:#818cf8;background:#eef2ff;color:#4338ca}
.word-pool{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}

/* Actions */
.actions{padding:10px 16px 18px;display:flex;gap:8px}
.act-btn{flex:1;border:2px solid #dfe6f5;border-radius:14px;padding:13px 6px;font-size:13px;font-weight:900;background:white;cursor:pointer;font-family:inherit;touch-action:manipulation;display:flex;align-items:center;justify-content:center;gap:5px;transition:.15s;-webkit-appearance:none}
.act-btn:active{transform:scale(.96);opacity:.85}
.act-btn.primary{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:white;border:none}
.act-btn.ok{background:var(--ok);color:white;border:none}
.act-btn.hint-bounce{animation:hb .5s ease infinite alternate}
@keyframes hb{from{transform:translateY(0)}to{transform:translateY(-4px)}}

/* ── SESSION DONE ────────────────── */
.done-wrap{padding:20px 16px}
.done-card{background:white;border-radius:var(--r);padding:26px 22px;box-shadow:var(--shadow);text-align:center}
.done-char{font-size:68px;display:block;animation:bob 2s ease-in-out infinite;margin-bottom:10px}
.done-title{font-size:24px;font-weight:900}
.done-stars{font-size:30px;font-weight:900;color:var(--star);margin:10px 0 4px}
.done-sub{font-size:14px;color:#7c8aab;font-weight:800;margin-bottom:18px}
.done-sents{text-align:left;border-top:1.5px solid #f1f3f8;padding-top:14px}
.done-sent{background:#f8f9fc;border-radius:12px;padding:11px 13px;font-size:14px;font-weight:800;margin-bottom:7px;display:flex;justify-content:space-between;align-items:center;gap:8px}
.done-sent span{flex:1;line-height:1.4}
.done-sent button{border:none;background:none;font-size:19px;cursor:pointer;padding:0;flex-shrink:0}
.btn-sec{display:block;margin:10px 16px 0;width:calc(100% - 32px);border:2px solid #dfe6f5;border-radius:var(--r);padding:15px;font-size:17px;font-weight:900;cursor:pointer;font-family:inherit;background:white;color:#4338ca;touch-action:manipulation;transition:.15s;-webkit-appearance:none}
.btn-sec:active{transform:scale(.97)}

/* ── LEVEL UP POPUP ─────────────── */
.lv-overlay{position:fixed;inset:0;background:rgba(30,41,64,.6);z-index:400;display:none;align-items:center;justify-content:center}
.lv-overlay.on{display:flex}
.lv-popup{background:white;border-radius:var(--r);padding:34px 26px;text-align:center;max-width:300px;width:90%}
.lv-pop-em{font-size:60px;display:block;margin-bottom:10px}
.lv-pop-title{font-size:21px;font-weight:900;margin-bottom:5px}
.lv-pop-sub{font-size:14px;color:#7c8aab;font-weight:800;margin-bottom:18px}
.lv-pop-btn{border:none;border-radius:12px;padding:13px 26px;font-size:16px;font-weight:900;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:white;cursor:pointer;font-family:inherit}

/* ── PARTICLES / TOASTS ─────────── */
.star-p{position:fixed;pointer-events:none;z-index:9999;font-size:22px;animation:starfly .9s ease-out forwards}
@keyframes starfly{0%{transform:translate(0,0) scale(1);opacity:1}100%{transform:translate(var(--dx),var(--dy)) scale(.2);opacity:0}}
.correct-pop{position:fixed;bottom:86px;left:50%;transform:translateX(-50%) translateY(40px);background:var(--ok);color:white;border-radius:999px;padding:11px 24px;font-size:16px;font-weight:900;box-shadow:0 8px 24px rgba(34,197,94,.4);z-index:200;opacity:0;transition:.3s;white-space:nowrap;pointer-events:none}
.correct-pop.on{transform:translateX(-50%) translateY(0);opacity:1}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(50px);background:#1e2940;color:white;padding:11px 18px;border-radius:999px;font-size:14px;font-weight:900;z-index:300;transition:.3s;white-space:nowrap;pointer-events:none;opacity:0}
.toast.on{transform:translateX(-50%) translateY(0);opacity:1}
</style>
</head>
<body>

<!-- HOME -->
<div id="scr-home" class="scr on">
  <div class="home-header">
    <span class="app-title">🗣 English!</span>
    <div class="stats-row">
      <span class="stat-pill">🔥&thinsp;<b id="h-streak">0</b></span>
      <span class="stat-pill">⭐&thinsp;<b id="h-stars">0</b></span>
    </div>
  </div>
  <div class="char-card">
    <span class="char-em" id="h-char">🥚</span>
    <div class="char-nm" id="h-char-nm">아직 알 속에...</div>
    <div class="xp-bar"><div class="xp-fill" id="h-xp" style="width:0%"></div></div>
    <div class="xp-lbl" id="h-xp-lbl">⭐ 0 / 10</div>
  </div>
  <div class="section">
    <div class="sec-label">학년 선택</div>
    <div class="grade-row" id="grade-row"></div>
    <div class="vocab-card" id="vocab-card"></div>
  </div>
  <button class="btn-play" id="btn-play">🎮 말하기 시작!</button>
</div>

<!-- GAME -->
<div id="scr-game" class="scr">
  <div class="topbar">
    <button class="btn-back" id="btn-back">←</button>
    <div class="tb-pills">
      <span class="tb-pill">🔥&thinsp;<span id="g-streak">0</span></span>
      <span class="tb-pill">⭐&thinsp;<span id="g-stars">0</span></span>
    </div>
    <span class="grade-tag" id="g-grade-tag">1학년</span>
  </div>
  <div class="lv-prog" id="lv-prog"></div>
  <div class="scene-card" id="scene-card"></div>
  <div class="content">
    <div class="step-info" id="g-step-info">
      <span class="lv-badge" id="g-lv-badge">Level 1</span>
      <span id="g-step-txt">1 / 2</span>
    </div>
    <div id="g-content"></div>
  </div>
  <div class="actions" id="g-actions"></div>
</div>

<!-- DONE -->
<div id="scr-done" class="scr">
  <div class="done-wrap">
    <div class="done-card">
      <span class="done-char" id="d-char">🎉</span>
      <div class="done-title">잘 했어요! 🎊</div>
      <div class="done-stars" id="d-stars">⭐ +0</div>
      <div class="done-sub" id="d-sub">0문장 완성!</div>
      <div class="done-sents" id="d-sents"></div>
    </div>
  </div>
  <button class="btn-play" id="btn-again">🔄 다음 씬 도전!</button>
  <button class="btn-sec" id="btn-home">🏠 홈으로</button>
</div>

<!-- LEVEL UP -->
<div class="lv-overlay" id="lv-overlay">
  <div class="lv-popup">
    <span class="lv-pop-em" id="lv-em">🐣</span>
    <div class="lv-pop-title" id="lv-title">캐릭터 진화!</div>
    <div class="lv-pop-sub" id="lv-sub">영어 병아리가 됐어요!</div>
    <button class="lv-pop-btn" id="lv-ok">계속하기 →</button>
  </div>
</div>

<div class="correct-pop" id="correct-pop"></div>
<div class="toast" id="toast"></div>

<script src="./elementary_vocab.js"></script>
<script>
// ── CHARACTERS ─────────────────────────────────
var CHARS=[
  {em:'🥚', nm:'아직 알 속에...', need:0},
  {em:'🐣', nm:'영어 병아리',     need:10},
  {em:'🐥', nm:'노란 병아리',     need:30},
  {em:'🐦', nm:'영어 새',         need:100},
  {em:'🦜', nm:'영어 앵무새',     need:300},

function loadS(){
  try{
    var d=JSON.parse(localStorage.getItem('speak3')||'{}');
    ['grade','stars','streak','lastDate','sceneIdx'].forEach(function(k){if(d[k]!=null)S[k]=d[k];});
  }catch(e){}

function today(){var d=new Date();return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();}
function checkStreak(){
  var t=today();if(S.lastDate===t)return;
  var y=new Date();y.setDate(y.getDate()-1);
  var ys=y.getFullYear()+'-'+(y.getMonth()+1)+'-'+y.getDate();
  S.streak=(S.lastDate===ys)?S.streak+1:1;
  S.lastDate=t;saveS();
}

function speak(txt){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  var u=new SpeechSynthesisUtterance(txt);
  u.lang='en-US';u.rate=0.85;
  window.speechSynthesis.speak(u);
}
function spawnStars(x,y,n){
  for(var i=0;i<n;i++){
    (function(i){
      var s=document.createElement('div');s.className='star-p';s.textContent='⭐';
      var a=(Math.random()*160-80)*Math.PI/180,d=50+Math.random()*65;
      s.style.cssText='left:'+x+'px;top:'+y+'px;animation-delay:'+(i*65)+'ms';
      s.style.setProperty('--dx',Math.sin(a)*d+'px');
      s.style.setProperty('--dy',(-Math.abs(Math.cos(a))*d*.9)+'px');
      document.body.appendChild(s);
      setTimeout(function(){s.remove();},1100+i*65);
    })(i);
  }
}
function popOk(msg){
  var el=document.getElementById('correct-pop');
  el.textContent=msg;el.classList.add('on');
  setTimeout(function(){el.classList.remove('on');},1400);
}
function toast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('on');
  setTimeout(function(){t.classList.remove('on');},2000);
}
function getChar(){var c=CHARS[0];for(var i=0;i<CHARS.length;i++){if(S.stars>=CHARS[i].need)c=CHARS[i];}return c;}
function getNext(){for(var i=0;i<CHARS.length-1;i++){if(S.stars<CHARS[i+1].need)return CHARS[i+1];}return null;}
function checkLvUp(prev){
  for(var i=1;i<CHARS.length;i++){
    if(prev<CHARS[i].need&&S.stars>=CHARS[i].need){
      var c=CHARS[i];
      document.getElementById('lv-em').textContent=c.em;
      document.getElementById('lv-title').textContent='캐릭터 진화!';
      document.getElementById('lv-sub').textContent=c.nm+'(으)로 진화했어요!';
      document.getElementById('lv-overlay').classList.add('on');
      return;
    }
  }
}
function shuffle(a){var b=a.slice();for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=b[i];b[i]=b[j];b[j]=t;}return b;}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function renderProgress(){
  var sc=G.scene,prog=document.getElementById('lv-prog');prog.innerHTML='';
  var total=sc.level1.length+sc.level2.length+1;
  var done=0;
  if(G.lv>1)done+=sc.level1.length;else done+=G.step;
  if(G.lv>2)done+=sc.level2.length;else if(G.lv===2)done+=G.step;
  if(G.lv>3)done+=1;
  for(var i=0;i<total;i++){
    var b=document.createElement('div');
    b.className='lv-bar'+(i<done?' done':(i===done?' active':''));
    prog.appendChild(b);
  }
  var lbl=document.createElement('span');lbl.className='lv-lbl';lbl.textContent=done+'/'+total;
  prog.appendChild(lbl);
}

  var badge=document.getElementById('g-lv-badge');
  badge.textContent='Level '+G.lv;
  badge.style.background=['#6366f1','#059669','#d97706'][G.lv-1]||'#6366f1';
  if(G.lv===1)renderL1();
  else if(G.lv===2)renderL2();
  else renderL3();
}

// ── LEVEL 1 ────────────────────────────────────
function renderL1(){
  var step=G.scene.level1[G.step];
  document.getElementById('g-step-txt').textContent=(G.step+1)+' / '+G.scene.level1.length;
  var parts=step.tpl.split('___');
  var senHtml=esc(parts[0])+'<span class="blank active" id="l1b">___</span>'+(parts[1]?esc(parts[1]):'');
  var chHtml='<div class="choices" id="l1-ch">';
  step.choices.forEach(function(c){
    chHtml+='<button class="ch-btn" data-v="'+esc(c)+'">'+esc(c)+'</button>';
  });
  chHtml+='</div>';
  // tenseHint box (과거/완료 씬에만)
  var hintHtml='';
  if(step.tenseHint){
    var lines=step.tenseHint.split('\n');
    hintHtml='<div class="tense-hint"><b>📌 문법 포인트</b>'+lines.map(esc).join('<br>')+'</div>';
  }
  document.getElementById('g-content').innerHTML=
    '<div class="sen-box">'+senHtml+'</div>'+chHtml+hintHtml;
  document.querySelectorAll('#l1-ch .ch-btn').forEach(function(b){
    b.addEventListener('click',function(e){onL1(this,e);});
  });
  buildActions(false,'l1');
}

function onL1(btn,e){
  var step=G.scene.level1[G.step];
  if(btn.dataset.v===step.ans){
    btn.classList.add('correct-flash');
    var bl=document.getElementById('l1b');
    if(bl){bl.textContent=step.ans;bl.classList.remove('active');bl.classList.add('filled');}
    document.querySelectorAll('#l1-ch .ch-btn').forEach(function(b){b.style.pointerEvents='none';});
    var earned=G.hints===0?1:0,prev=S.stars;
    S.stars+=earned;G.sesStars+=earned;
    document.getElementById('g-stars').textContent=S.stars;
    if(earned>0){spawnStars(e.clientX,e.clientY,3);popOk('⭐ +'+earned+' 정답!');}
    G.sentences.push(step.tpl.replace('___',step.ans));
    speak(step.tpl.replace('___',step.ans));
    buildActions(true,'l1');saveS();checkLvUp(prev);
  } else {
    G.wrongs++;
    btn.classList.add('wrong-anim');
    setTimeout(function(){btn.classList.remove('wrong-anim');},400);
    if(G.wrongs>=2){var h=document.getElementById('act-hint');if(h)h.classList.add('hint-bounce');}
  }
}
function doHintL1(){
  var step=G.scene.level1[G.step];G.hints++;
  var btns=[].slice.call(document.querySelectorAll('#l1-ch .ch-btn:not(.dim):not(.correct-flash)'));
  if(G.hints===1){var d=false;btns.forEach(function(b){if(!d&&b.dataset.v!==step.ans){b.classList.add('dim');d=true;}});}
  else if(G.hints===2){btns.forEach(function(b){if(b.dataset.v===step.ans)b.classList.add('highlight');});}
  else{btns.forEach(function(b){if(b.dataset.v===step.ans)b.click();});}
}

// ── LEVEL 2 ────────────────────────────────────
function renderL2(){
  var step=G.scene.level2[G.step];
  G.blankIdx=0;G.l2ans=[];
  document.getElementById('g-step-txt').textContent=(G.step+1)+' / '+G.scene.level2.length;
  drawL2(step,false);buildActions(false,'l2');
}
function drawL2(step,done){
  var html=step.tpl;
  for(var i=0;i<step.blanks.length;i++){
    var filled=G.l2ans[i],active=!done&&i===G.blankIdx;
    var cls='blank'+(active?' active':'')+(filled?' filled':'');
    html=html.replace('_B'+i+'_','<span class="'+cls+'" id="l2b'+i+'">'+(filled?esc(filled):(active?'?':'___'))+'</span>');
  }
  var chHtml='';
  if(!done){
    chHtml='<div class="choices" id="l2-ch">';
    step.blanks[G.blankIdx].choices.forEach(function(c){
      chHtml+='<button class="ch-btn" data-v="'+esc(c)+'">'+esc(c)+'</button>';
    });
    chHtml+='</div>';
  }
  document.getElementById('g-content').innerHTML='<div class="sen-box">'+html+'</div>'+chHtml;
  if(!done){
    document.querySelectorAll('#l2-ch .ch-btn').forEach(function(b){
      b.addEventListener('click',function(e){onL2(this,e,step);});
    });
  }
}
function onL2(btn,e,step){
  var bl=step.blanks[G.blankIdx];
  if(btn.dataset.v===bl.ans){
    btn.classList.add('correct-flash');G.l2ans[G.blankIdx]=bl.ans;
    spawnStars(e.clientX,e.clientY,2);G.blankIdx++;
    if(G.blankIdx>=step.blanks.length){
      var full=step.tpl;
      for(var i=0;i<step.blanks.length;i++)full=full.replace('_B'+i+'_',step.blanks[i].ans);
      G.sentences.push(full);
      var earned=G.hints===0?2:1,prev=S.stars;
      S.stars+=earned;G.sesStars+=earned;
      document.getElementById('g-stars').textContent=S.stars;
      popOk('⭐ +'+earned+' 완성!');speak(full);
      setTimeout(function(){drawL2(step,true);buildActions(true,'l2');},350);
      saveS();checkLvUp(prev);
    } else {
      setTimeout(function(){drawL2(step,false);buildActions(false,'l2');},280);
    }
  } else {
    G.wrongs++;btn.classList.add('wrong-anim');
    setTimeout(function(){btn.classList.remove('wrong-anim');},400);
  }
}
function doHintL2(){
  var bl=G.scene.level2[G.step].blanks[G.blankIdx];G.hints++;
  var btns=[].slice.call(document.querySelectorAll('#l2-ch .ch-btn:not(.dim):not(.correct-flash)'));
  if(G.hints===1){var d=false;btns.forEach(function(b){if(!d&&b.dataset.v!==bl.ans){b.classList.add('dim');d=true;}});}
  else{btns.forEach(function(b){if(b.dataset.v===bl.ans)b.classList.add('highlight');});}
}

// ── LEVEL 3 ────────────────────────────────────
function renderL3(){
  document.getElementById('g-step-txt').textContent='문장 조립';
  var words=G.scene.level3.replace(/[.!?]/g,'').split(' ');
  G.l3words=shuffle(words);G.l3ans=[];G.l3used=[];
  drawL3(false);buildActions(false,'l3');
}
function drawL3(done){
  var ansH='<div class="l3-drop'+(G.l3ans.length?' has':'')+'" id="l3-ans">';
  if(G.l3ans.length){G.l3ans.forEach(function(w,i){ansH+='<button class="word-chip ans-chip" data-ai="'+i+'">'+esc(w)+'</button>';});}
  else ansH+='<span class="l3-ph">단어를 순서대로 탭하세요</span>';
  ansH+='</div>';
  var poolH='<div class="word-pool" id="l3-pool">';
  G.l3words.forEach(function(w,i){
    poolH+='<button class="word-chip'+(G.l3used.indexOf(i)!==-1?' used':'')+'" data-i="'+i+'">'+esc(w)+'</button>';
  });
  poolH+='</div>';
  document.getElementById('g-content').innerHTML=ansH+poolH;
  if(!done){
    document.querySelectorAll('#l3-pool .word-chip:not(.used)').forEach(function(b){
      b.addEventListener('click',function(){pickL3(parseInt(this.dataset.i));});
    });
    document.querySelectorAll('#l3-ans .word-chip').forEach(function(b){
      b.addEventListener('click',function(){removeL3(parseInt(this.dataset.ai));});
    });
  }
}
function pickL3(idx){
  G.l3used.push(idx);G.l3ans.push(G.l3words[idx]);
  drawL3(false);buildActions(false,'l3');
  if(G.l3used.length===G.l3words.length)checkL3();
}
function removeL3(ai){G.l3ans.splice(ai,1);G.l3used.splice(ai,1);drawL3(false);buildActions(false,'l3');}
function checkL3(){
  var correct=G.scene.level3.replace(/[.!?]/g,'').split(' ');
  if(G.l3ans.join(' ')===correct.join(' ')){
    G.sentences.push(G.scene.level3);
    var earned=3,prev=S.stars;
    S.stars+=earned;G.sesStars+=earned;
    document.getElementById('g-stars').textContent=S.stars;
    spawnStars(window.innerWidth/2,window.innerHeight*.5,6);
    popOk('⭐ +'+earned+' 완성!');speak(G.scene.level3);
    setTimeout(function(){drawL3(true);buildActions(true,'l3');},400);
    saveS();checkLvUp(prev);
  } else {
    toast('순서가 달라요. 다시 해봐요! 💪');
    G.l3ans=[];G.l3used=[];
    setTimeout(function(){drawL3(false);buildActions(false,'l3');},300);
  }
}
function doHintL3(){
  var correct=G.scene.level3.replace(/[.!?]/g,'').split(' ');
  var need=correct[G.l3ans.length];if(!need)return;
  for(var i=0;i<G.l3words.length;i++){
    if(G.l3words[i]===need&&G.l3used.indexOf(i)===-1){
      var chip=document.querySelector('#l3-pool .word-chip[data-i="'+i+'"]');
      if(chip){chip.classList.add('highlight');setTimeout(function(){chip.classList.remove('highlight');},1200);}
      break;
    }
  }
}

// ── ACTIONS BAR ────────────────────────────────
function buildActions(answered,mode){
  var bar=document.getElementById('g-actions');bar.innerHTML='';
  var listen=mkBtn('🔊 듣기','act-btn',function(){
    if(mode==='l1'){var s=G.scene.level1[G.step];speak(s.tpl.replace('___',s.ans));}
    else if(mode==='l2'){
      var s2=G.scene.level2[G.step],f=s2.tpl;
      for(var i=0;i<s2.blanks.length;i++)f=f.replace('_B'+i+'_',G.l2ans[i]||s2.blanks[i].ans);
      speak(f.replace(/_B\d+_/g,'...'));
    } else speak(G.scene.level3);
  });
  bar.appendChild(listen);
  if(answered){
    if(mode==='l3'){bar.appendChild(mkBtn('✅ 완료!','act-btn ok',showDone));}
    else{bar.appendChild(mkBtn('다음 →','act-btn primary',advance));}
  } else {
    if(mode==='l3'&&G.l3ans.length>0){
      bar.appendChild(mkBtn('↩ 지우기','act-btn',function(){G.l3ans=[];G.l3used=[];drawL3(false);buildActions(false,'l3');}));
    }
    var h=mkBtn('💡 힌트','act-btn',mode==='l1'?doHintL1:(mode==='l2'?doHintL2:doHintL3));
    h.id='act-hint';bar.appendChild(h);
  }
}
function mkBtn(txt,cls,fn){var b=document.createElement('button');b.className=cls;b.innerHTML=txt;b.addEventListener('click',fn);return b;}

// ── ADVANCE / DONE ─────────────────────────────
function advance(){
  var sc=G.scene;
  if(G.lv===1){G.step++;if(G.step>=sc.level1.length){G.lv=2;G.step=0;}}
  else if(G.lv===2){G.step++;if(G.step>=sc.level2.length){G.lv=3;G.step=0;}}
  renderStep();window.scrollTo(0,0);
}
function showDone(){
  var sc=sceneList();S.sceneIdx=(S.sceneIdx+1)%Math.max(1,sc.length);saveS();
  document.getElementById('d-char').textContent=getChar().em;
  document.getElementById('d-stars').textContent='⭐ +'+G.sesStars;
  document.getElementById('d-sub').textContent='이번 세션 '+G.sentences.length+'문장 완성! 🎉';
  var list=document.getElementById('d-sents');list.innerHTML='';
  G.sentences.forEach(function(s){
    var d=document.createElement('div');d.className='done-sent';
    var sp=document.createElement('span');sp.textContent=s;
    var b=document.createElement('button');b.textContent='🔊';
    (function(t){b.addEventListener('click',function(){speak(t);});})(s);
    d.appendChild(sp);d.appendChild(b);list.appendChild(d);
  });
  spawnStars(window.innerWidth/2,window.innerHeight*.3,8);
  showScr('scr-done');
}

function sceneList(){
  if(!RANDOM_SCENE_CACHE[S.grade]) RANDOM_SCENE_CACHE[S.grade]=buildGradeScenes(S.grade);
  return RANDOM_SCENE_CACHE[S.grade];
}
function startSession(){
  checkStreak();
  RANDOM_SCENE_CACHE[S.grade]=buildGradeScenes(S.grade);
  var sc=sceneList();
  if(!sc.length){toast('No scenes for this grade.');return;}
  G.scene=sc[S.sceneIdx%sc.length];
  G.lv=1;G.step=0;G.blankIdx=0;
  G.l2ans=[];G.l3words=[];G.l3ans=[];G.l3used=[];
  G.hints=0;G.wrongs=0;G.sesStars=0;G.sentences=[];
  document.getElementById('g-streak').textContent=S.streak;
  document.getElementById('g-stars').textContent=S.stars;
  var tag=document.getElementById('g-grade-tag');
  tag.textContent=S.grade+'학년';tag.style.background=GCOL[S.grade-1];
  renderSceneCard();renderStep();
  showScr('scr-game');
}
function renderSceneCard(){
  var sc=G.scene;
  var tbCls=sc.tbCls||'tb-present';
  var title=sceneTitle(sc);
  var html='<div class="sc-head"><span class="time-badge '+tbCls+'">'+esc(sc.timeBadge)+'</span><span class="sc-label">'+esc(title)+'</span></div>'+
    '<div class="scene-ill-wrap"><div class="scene-ill">'+sceneIllustration(sc.id)+'</div></div><div class="scene-tags">';
  (sc.storyLabels||[]).forEach(function(lbl){html+='<span class="scene-tag">'+esc(lbl)+'</span>';});
  html+='</div>';
  if(sc.usedVocab&&sc.usedVocab.length){
    html+='<details class="used-vocab-box"><summary class="used-vocab-toggle">사용 어휘 보기</summary><div class="used-vocab-list">';
    sc.usedVocab.forEach(function(item){html+='<div class="used-vocab-chip"><span class="vocab-en">'+esc(item[0])+'</span><span class="vocab-ko">'+esc(item[1]||'')+'</span></div>';});
    html+='</div></details>';
  }
  html+='<div class="ko-hint"><span class="ko-icon">💡</span>'+esc(sc.koreanHint)+'</div>';
  document.getElementById('scene-card').innerHTML=html;
}

function wordByKey(list,key){for(var i=0;i<list.length;i++)if(list[i].key===key)return list[i];return null;}
function ownerFor(s){return s&&s.key==='i'?'my':(s&&s.key==='we'?'our':(s&&(s.key==='they'||s.isPlural)?'their':'her'));}
function objectText(o,s){if(o.article==='own')return ownerFor(s)+' '+o.text;return (o.article?o.article+' ':'')+o.text;}
function placePhrase(p){return p.phrase||('in '+p.text);}
function subjectVerb(s,v){return s.isFirst||s.isPlural?v.base:(v.base==='go'?'goes':v.base+'s');}
function beNow(s){return s.isFirst?'am':(s.isPlural?'are':'is');}
function haveNow(s){return s.isPlural||s.isFirst?'have':'has';}
function sample(list,n){return shuffled(list).slice(0,n);}
function sceneAssetId(placeKey,action,obj){
  var p=GEN_WORDS.places[placeKey]||GEN_WORDS.places.field;
  return p.sceneId||'sunny_day';
}
function setSceneComponent(id,placeKey,action,obj,extraProp){
  var p=GEN_WORDS.places[placeKey]||GEN_WORDS.places.field;
  var main=(obj&&obj.main)||action.main||'child_smile';
  var props=[];
  if(obj&&obj.prop)props.push(obj.prop);
  if(extraProp)props.push(extraProp);
  SCENE_COMPONENTS[id]={bg:p.bg,main:main,props:props};
}
function generatedScene(base,variant){
  var id=base.id+'_'+Math.floor(Math.random()*100000);
  setSceneComponent(id,base.place,base.action,base.object,base.prop);
  return {
    id:id,grade:base.grade,tense:base.tense,timeBadge:base.timeBadge,tbCls:base.tbCls,
    label:base.label,storyLabels:base.storyLabels,koreanHint:base.koreanHint,
    usedVocab:base.usedVocab,level1:variant.level1,level2:variant.level2,level3:variant.level3
  };
}
function distractForms(v,correct){
  var forms=[v.base,v.ing,v.past,v.pp].filter(function(x,i,a){return x&&a.indexOf(x)===i;});
  return shuffled([correct].concat(forms.filter(function(x){return x!==correct;}))).slice(0,3);
}
function distractObjects(correct){
  return shuffled([correct,'book','apple','homework','pizza','school','room','ball'].filter(function(x,i,a){return x&&a.indexOf(x)===i;})).slice(0,3);
}
function makePresentProgressive(grade,subjectKey,verbKey,objKey,placeKey){
  var s=wordByKey(GEN_WORDS.subjects,subjectKey),v=wordByKey(GEN_WORDS.actions,verbKey),o=objKey?wordByKey(GEN_WORDS.objects,objKey):null,p=GEN_WORDS.places[placeKey];
  var obj=o?objectText(o,s):'', verb=v.ing, be=beNow(s), place=placePhrase(p);
  var full=o?s.text+' '+be+' '+verb+' '+obj+'.':s.text+' '+be+' '+verb+' '+place+'.';
  var l2=o?s.text+' '+be+' _B0_ '+objectText(o,s)+'.':s.text+' '+be+' _B0_ _B1_.';
  var blanks=o?[{choices:distractForms(v,verb),ans:verb}]:[{choices:distractForms(v,verb),ans:verb},{choices:distractObjects(place),ans:place}];
  return generatedScene({
    id:sceneAssetId(placeKey,v,o),grade:grade,tense:'present',timeBadge:'NOW',tbCls:'tb-present',
    label:'Vocabulary Scene',place:placeKey,action:v,object:o,
    storyLabels:[s.text.replace('The ',''),v.base,o?o.text:p.text],
    koreanHint:'어휘에서 고른 단어로 만든 현재진행 문장입니다.',
    usedVocab:[[s.text,s.ko],[v.base,v.ko]].concat(o?[[o.text,o.ko]]:[[p.text,p.ko]])
  },{level1:[{tpl:s.text+' '+be+' ___'+(o?' '+obj:'.'),choices:distractForms(v,verb),ans:verb,tenseHint:'Present progressive\nUse '+be+' + verb-ing.'}],level2:[{tpl:l2,blanks:blanks}],level3:full});
}
function makeSimplePresent(grade,subjectKey,verbKey,objKey,placeKey){
  var s=wordByKey(GEN_WORDS.subjects,subjectKey),v=wordByKey(GEN_WORDS.actions,verbKey),o=objKey?wordByKey(GEN_WORDS.objects,objKey):null,p=GEN_WORDS.places[placeKey];
  var verb=subjectVerb(s,v), place=placePhrase(p), full=o?s.text+' '+verb+' '+objectText(o,s)+' every day.':s.text+' '+verb+' '+place+' every day.';
  return generatedScene({
    id:sceneAssetId(placeKey,v,o),grade:grade,tense:'present',timeBadge:'EVERY DAY',tbCls:'tb-present',
    label:'Daily Vocabulary',place:placeKey,action:v,object:o,
    storyLabels:[s.text.replace('The ',''),v.base,o?o.text:p.text],
    koreanHint:'어휘에서 고른 단어로 만든 반복 습관 문장입니다.',
    usedVocab:[[s.text,s.ko],[v.base,v.ko]].concat(o?[[o.text,o.ko]]:[[p.text,p.ko]])
  },{level1:[{tpl:s.text+' ___ '+(o?objectText(o,s):place)+' every day.',choices:distractForms(v,verb),ans:verb,tenseHint:'Simple present\nUse this tense for routines.'}],level2:[{tpl:s.text+' _B0_ _B1_ every day.',blanks:[{choices:distractForms(v,verb),ans:verb},{choices:distractObjects(o?objectText(o,s):place),ans:o?objectText(o,s):place}]}],level3:full});
}
function makeSimplePast(grade,subjectKey,verbKey,objKey,placeKey){
  var s=wordByKey(GEN_WORDS.subjects,subjectKey),v=wordByKey(GEN_WORDS.actions,verbKey),o=objKey?wordByKey(GEN_WORDS.objects,objKey):null,p=GEN_WORDS.places[placeKey];
  var place=placePhrase(p), full=o?s.text+' '+v.past+' '+objectText(o,s)+' yesterday.':s.text+' '+v.past+' '+place+' yesterday.';
  return generatedScene({
    id:sceneAssetId(placeKey,v,o),grade:grade,tense:'past',timeBadge:'YESTERDAY',tbCls:'tb-past',
    label:'Past Vocabulary',place:placeKey,action:v,object:o,
    storyLabels:[s.text.replace('The ',''),v.past,o?o.text:p.text],
    koreanHint:'어휘에서 고른 단어로 만든 과거형 문장입니다.',
    usedVocab:[[s.text,s.ko],[v.past,v.ko]].concat(o?[[o.text,o.ko]]:[[p.text,p.ko]])
  },{level1:[{tpl:s.text+' ___ '+(o?objectText(o,s):place)+' yesterday.',choices:distractForms(v,v.past),ans:v.past,tenseHint:'Simple past\nUse the past form for a finished action.'}],level2:[{tpl:s.text+' _B0_ _B1_ yesterday.',blanks:[{choices:distractForms(v,v.past),ans:v.past},{choices:distractObjects(o?objectText(o,s):place),ans:o?objectText(o,s):place}]}],level3:full});
}
function makePresentPerfect(grade,subjectKey,verbKey,objKey,placeKey){
  var s=wordByKey(GEN_WORDS.subjects,subjectKey),v=wordByKey(GEN_WORDS.actions,verbKey),o=wordByKey(GEN_WORDS.objects,objKey),hv=haveNow(s);
  var full=s.text+' '+hv+' already '+v.pp+' '+objectText(o,s)+'.';
  return generatedScene({
    id:sceneAssetId(placeKey,v,o),grade:grade,tense:'perfect',timeBadge:'ALREADY',tbCls:'tb-perfect',
    label:'Perfect Vocabulary',place:placeKey,action:v,object:o,
    storyLabels:[s.text.replace('The ',''),hv+' '+v.pp,o.text],
    koreanHint:'어휘에서 고른 단어로 만든 현재완료 문장입니다.',
    usedVocab:[[s.text,s.ko],[hv+' '+v.pp,v.ko],[o.text,o.ko],['already','이미']]
  },{level1:[{tpl:s.text+' '+hv+' already ___ '+objectText(o,s)+'.',choices:distractForms(v,v.pp),ans:v.pp,tenseHint:'Present perfect\nUse have/has + past participle.'}],level2:[{tpl:s.text+' _B0_ already _B1_ '+objectText(o,s)+'.',blanks:[{choices:shuffled([hv,hv==='have'?'has':'have','am']),ans:hv},{choices:distractForms(v,v.pp),ans:v.pp}]}],level3:full});
}
function buildGradeScenes(grade){
  var scenes=[];
  if(grade===1){
    scenes.push(makePresentProgressive(1,'dog','run',null,'park'));
    scenes.push(makePresentProgressive(1,'dog','walk',null,'park'));
    scenes.push(makePresentProgressive(1,'cat','sleep',null,'bedroom'));
    scenes.push(makePresentProgressive(1,'i','eat','apple','field'));
    scenes.push(makePresentProgressive(1,'i','hold','apple','field'));
  }else if(grade===2){
    scenes.push(makeSimplePresent(2,'she','read','book','school'));
    scenes.push(makeSimplePresent(2,'i','write','homework','study'));
    scenes.push(makeSimplePresent(2,'we','play','soccer','soccer'));
    scenes.push(makePresentProgressive(2,'she','hold','book','school'));
    scenes.push(makeSimplePresent(2,'i','read','story','school'));
  }else if(grade===3){
    scenes.push(makeSimplePast(3,'she','eat','pizza','dinner'));
    scenes.push(makeSimplePast(3,'we','play','soccer','soccer'));
    scenes.push(makeSimplePast(3,'we','kick','ball','soccer'));
    scenes.push(makeSimplePast(3,'we','walk',null,'rain'));
    scenes.push(makeSimplePast(3,'i','clean','room','clean_room'));
  }else if(grade===4){
    scenes.push(makeSimplePast(4,'we','observe','lion','zoo'));
    scenes.push(makeSimplePast(4,'i','finish','homework','study'));
    scenes.push(makeSimplePast(4,'she','read','book','school'));
    scenes.push(makeSimplePast(4,'we','visit','museum','london'));
    scenes.push(makeSimplePast(4,'i','hold','apple','field'));
  }else if(grade===5){
    scenes.push(makePresentPerfect(5,'she','finish','homework','study'));
    scenes.push(makePresentPerfect(5,'they','eat','lunch','lunch'));
    scenes.push(makePresentPerfect(5,'i','visit','London','london'));
    scenes.push(makePresentPerfect(5,'she','finish','assignment','study'));
    scenes.push(makePresentPerfect(5,'i','clean','room','clean_room'));
  }else{
    scenes.push(makePresentPerfect(6,'we','visit','museum','london'));
    scenes.push(makePresentPerfect(6,'we','visit','city','london'));
    scenes.push(makePresentPerfect(6,'she','eat','meal','lunch'));
    scenes.push(makePresentPerfect(6,'i','finish','homework','study'));
    scenes.push(makePresentPerfect(6,'i','clean','room','clean_room'));
  }
  return shuffled(scenes);
}
function sceneList(){
  if(!RANDOM_SCENE_CACHE[S.grade]) RANDOM_SCENE_CACHE[S.grade]=buildGradeScenes(S.grade);
  return RANDOM_SCENE_CACHE[S.grade];
}
function sceneIllustration(id){
  var c=SCENE_COMPONENTS[id];
  if(!c) return '<img src="./scene_webp/'+encodeURIComponent(id)+'.webp?v='+WEBP_SCENE_VER+'" alt="'+esc(id)+'">';
  var html='<div class="scene-stack">';
  if(c.bg) html+='<img class="scene-layer bg" src="./layer_assets/bg/'+encodeURIComponent(c.bg)+'.webp?v='+WEBP_SCENE_VER+'" alt="">';
  if(c.main) html+='<img class="scene-layer main" src="./layer_assets/main/'+encodeURIComponent(c.main)+'.webp?v='+WEBP_SCENE_VER+'" alt="">';
  (c.props||[]).forEach(function(p){html+='<img class="scene-layer prop" src="./layer_assets/prop/'+encodeURIComponent(p)+'.webp?v='+WEBP_SCENE_VER+'" alt="">';});
  html+='</div>';
  return html;
}
function startSession(){
  checkStreak();
  RANDOM_SCENE_CACHE[S.grade]=buildGradeScenes(S.grade);
  var sc=sceneList();
  if(!sc.length){toast('No scenes for this grade.');return;}
  G.scene=sc[S.sceneIdx%sc.length];
  G.lv=1;G.step=0;G.blankIdx=0;
  G.l2ans=[];G.l3words=[];G.l3ans=[];G.l3used=[];
  G.hints=0;G.wrongs=0;G.sesStars=0;G.sentences=[];
  document.getElementById('g-streak').textContent=S.streak;
  document.getElementById('g-stars').textContent=S.stars;
  var tag=document.getElementById('g-grade-tag');
  tag.textContent=S.grade+'학년';tag.style.background=GCOL[S.grade-1];
  renderSceneCard();renderStep();
  showScr('scr-game');
}
function renderSceneCard(){
  var sc=G.scene;
  var tbCls=sc.tbCls||'tb-present';
  var title=sceneTitle(sc);
  var html='<div class="sc-head"><span class="time-badge '+tbCls+'">'+esc(sc.timeBadge)+'</span><span class="sc-label">'+esc(title)+'</span></div>'+
    '<div class="scene-ill-wrap"><div class="scene-ill">'+sceneIllustration(sc.id)+'</div></div><div class="scene-tags">';
  (sc.storyLabels||[]).forEach(function(lbl){html+='<span class="scene-tag">'+esc(lbl)+'</span>';});
  html+='</div>';
  if(sc.usedVocab&&sc.usedVocab.length){
    html+='<details class="used-vocab-box"><summary class="used-vocab-toggle">사용 어휘 보기</summary><div class="used-vocab-list">';
    sc.usedVocab.forEach(function(item){html+='<div class="used-vocab-chip"><span class="vocab-en">'+esc(item[0])+'</span><span class="vocab-ko">'+esc(item[1]||'')+'</span></div>';});
    html+='</div></details>';
  }
  html+='<div class="ko-hint"><span class="ko-icon">💡</span>'+esc(sc.koreanHint)+'</div>';
  document.getElementById('scene-card').innerHTML=html;
}

function init(){
  loadS();checkStreak();renderHome();
  document.getElementById('btn-play').addEventListener('click',startSession);
  document.getElementById('btn-back').addEventListener('click',function(){showScr('scr-home');renderHome();});
  document.getElementById('btn-again').addEventListener('click',startSession);
  document.getElementById('btn-home').addEventListener('click',function(){showScr('scr-home');renderHome();});
  document.getElementById('lv-ok').addEventListener('click',function(){document.getElementById('lv-overlay').classList.remove('on');});
}
init();
</script>
